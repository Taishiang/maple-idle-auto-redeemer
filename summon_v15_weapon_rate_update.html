<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
<title>召喚模擬器 V15｜官方二段式機率版</title>

<style>
*{box-sizing:border-box}

html,body{
  margin:0;
  width:100%;
  height:100%;
  background:#05070d;
  font-family:"Microsoft JhengHei",Arial,sans-serif;
  overflow:hidden;
  color:#fff;
}

.wrap{
  width:100vw;
  height:100vh;
  display:flex;
  align-items:flex-start;
  justify-content:center;
  background:#05070d;
}

.stage{
  position:relative;
  width:100vw;
  height:100vh;
  overflow:auto;
  background:
    radial-gradient(circle at 50% 44%, rgba(126,77,255,.72), rgba(37,18,92,.82) 42%, rgba(8,7,24,1) 82%),
    linear-gradient(180deg,#111034,#674bd2);
}

.stars{
  position:absolute;
  inset:0;
  opacity:.42;
  background-image:
    radial-gradient(circle,rgba(255,255,255,.9) 0 1px,transparent 2px),
    radial-gradient(circle,rgba(255,255,255,.55) 0 1px,transparent 2px);
  background-size:96px 76px,150px 118px;
}

.top{
  position:absolute;
  left:2.7%;
  right:2.6%;
  top:2.6%;
  height:7%;
  display:flex;
  align-items:center;
  justify-content:space-between;
  z-index:5;
}

.leftTitle{
  display:flex;
  align-items:center;
  gap:1.2vw;
  font-size:clamp(18px,2vw,34px);
  font-weight:900;
}

.back{
  font-size:clamp(32px,4vw,58px);
}

.currency{
  display:flex;
  align-items:center;
  gap:2vw;
  font-size:clamp(14px,1.45vw,25px);
  font-weight:900;
}

.tabs{
  position:absolute;
  left:2.5%;
  top:17%;
  width:17%;
  display:flex;
  flex-direction:column;
  gap:1.2vh;
  z-index:4;
}

.tab{
  height:clamp(44px,8.2vh,86px);
  border:0;
  border-radius:14px;
  background:rgba(0,0,0,.34);
  color:#fff;
  font-size:clamp(14px,1.25vw,22px);
  font-weight:900;
  cursor:pointer;
}

.tab.active{
  background:linear-gradient(180deg,#31d8e9,#078ba8);
  box-shadow:0 0 18px rgba(44,223,255,.55);
}

.result{
  position:absolute;
  left:20%;
  right:3%;
  top:12%;
  bottom:18%;
  z-index:10;
  display:flex;
  flex-direction:column;
}

.summary{
  align-self:center;
  margin-bottom:18px;
  padding:12px 24px;
  border-radius:999px;
  background:rgba(0,0,0,.35);
  color:#ffe56b;
  font-size:clamp(13px,1vw,18px);
  font-weight:900;
  text-align:center;
}

.resultGrid{
  width:100%;
  display:grid;
  grid-template-columns:
    repeat(auto-fit,minmax(110px,1fr));
  gap:18px;
}

.itemWrap{
  display:flex;
  flex-direction:column;
  align-items:center;
  animation:pop .2s ease;
}

.itemWrap img{
  width:100%;
  max-width:110px;
  filter:drop-shadow(0 4px 8px rgba(0,0,0,.55));
}

.count{
  margin-top:6px;
  width:88%;
  height:28px;
  border-radius:8px;
  background:rgba(20,20,30,.95);
  display:flex;
  align-items:center;
  justify-content:center;
  color:white;
  font-size:20px;
  font-weight:900;
}

.rarityTag{
  margin-top:5px;
  padding:4px 10px;
  border-radius:999px;
  background:rgba(0,0,0,.38);
  color:#ffe56b;
  font-size:12px;
  font-weight:900;
}

.bottom{
  position:absolute;
  left:18%;
  right:6%;
  bottom:4%;
  height:13%;
  border-radius:18px;
  background:rgba(84,72,128,.58);
  display:flex;
  align-items:center;
  justify-content:center;
  gap:18px;
}

.btn{
  min-width:220px;
  height:64px;
  border:0;
  border-radius:14px;
  color:#fff;
  font-size:28px;
  font-weight:900;
  cursor:pointer;
}

.free{
  background:linear-gradient(#ddd,#999);
}

.once{
  background:linear-gradient(#18d0e3,#078eae);
}

.ten{
  background:linear-gradient(#c8f218,#88c500);
}

.rateInfo{
  position:absolute;
  right:2%;
  bottom:2%;
  padding:8px 14px;
  border-radius:999px;
  background:rgba(0,0,0,.28);
  color:rgba(255,255,255,.82);
  font-size:12px;
  font-weight:800;
}

@keyframes pop{
  from{
    opacity:0;
    transform:translateY(-8px) scale(.9);
  }
  to{
    opacity:1;
    transform:translateY(0) scale(1);
  }
}

@media(max-width:900px){

  .tabs{
    width:22%;
  }

  .result{
    left:25%;
  }

  .resultGrid{
    grid-template-columns:
      repeat(auto-fit,minmax(90px,1fr));
  }

  .btn{
    min-width:150px;
    font-size:20px;
  }

}

@media(max-width:640px){

  .tabs{
    width:25%;
  }

  .result{
    left:28%;
    top:11%;
  }

  .resultGrid{
    grid-template-columns:
      repeat(3,minmax(0,1fr));
    gap:10px;
  }

  .itemWrap img{
    max-width:78px;
  }

  .count{
    font-size:14px;
    height:22px;
  }

  .btn{
    min-width:110px;
    height:54px;
    font-size:16px;
  }

}
</style>
</head>

<body>

<div class="wrap">

<div class="stage">

<div class="stars"></div>

<div class="rateInfo">
武器機率：先抽稀有度，再抽低級/中級/高級/頂級
</div>

<div class="top">

<div class="leftTitle">
<span class="back">‹</span>
<span>一般武器召喚</span>
</div>

<div class="currency">
<span>🔷 0</span>
<span>💎 無限</span>
</div>

</div>

<div class="tabs">

<button class="tab active">
武器召喚
</button>

<button class="tab">
同伴召喚
</button>

<button class="tab">
新同伴挑選
</button>

</div>

<div class="result">

<div class="summary">
本次召喚 5,000 抽｜共 25 種武器｜官方邏輯：先抽稀有度，再抽品質
</div>

<div class="resultGrid" id="resultGrid"></div>

</div>

<div class="bottom">

<button class="btn free">
觀看廣告
</button>

<button class="btn once" onclick="draw(1)">
💎 1　召喚1次
</button>

<button class="btn ten" onclick="draw(5000)">
💎 10　一鍵召喚
</button>

</div>

</div>

</div>

<script>

const weaponPool=[
{"id":1,"series":"白色系列","tier":"低級","src":"weapon_01.png"},
{"id":2,"series":"白色系列","tier":"中級","src":"weapon_02.png"},
{"id":3,"series":"白色系列","tier":"高級","src":"weapon_03.png"},
{"id":4,"series":"白色系列","tier":"頂級","src":"weapon_04.png"},

{"id":5,"series":"藍色系列","tier":"低級","src":"weapon_05.png"},
{"id":6,"series":"藍色系列","tier":"中級","src":"weapon_06.png"},
{"id":7,"series":"藍色系列","tier":"高級","src":"weapon_07.png"},
{"id":8,"series":"藍色系列","tier":"頂級","src":"weapon_08.png"},

{"id":9,"series":"紫色系列","tier":"低級","src":"weapon_09.png"},
{"id":10,"series":"紫色系列","tier":"中級","src":"weapon_10.png"},
{"id":11,"series":"紫色系列","tier":"高級","src":"weapon_11.png"},
{"id":12,"series":"紫色系列","tier":"頂級","src":"weapon_12.png"},

{"id":13,"series":"橘色系列","tier":"低級","src":"weapon_13.png"},
{"id":14,"series":"橘色系列","tier":"中級","src":"weapon_14.png"},
{"id":15,"series":"橘色系列","tier":"高級","src":"weapon_15.png"},
{"id":16,"series":"橘色系列","tier":"頂級","src":"weapon_16.png"},

{"id":17,"series":"綠色系列","tier":"低級","src":"weapon_17.png"},
{"id":18,"series":"綠色系列","tier":"中級","src":"weapon_18.png"},
{"id":19,"series":"綠色系列","tier":"高級","src":"weapon_19.png"},
{"id":20,"series":"綠色系列","tier":"頂級","src":"weapon_20.png"},

{"id":21,"series":"紅色系列","tier":"低級","src":"weapon_21.png"},
{"id":22,"series":"紅色系列","tier":"中級","src":"weapon_22.png"},
{"id":23,"series":"紅色系列","tier":"高級","src":"weapon_23.png"},
{"id":24,"series":"紅色系列","tier":"頂級","src":"weapon_24.png"},

{"id":25,"series":"深藍特殊系列","tier":"低級","src":"weapon_25.png"},
{"id":26,"series":"深藍特殊系列","tier":"中級","src":"weapon_26.png"},
{"id":27,"series":"深藍特殊系列","tier":"高級","src":"weapon_27.png"},
{"id":28,"series":"深藍特殊系列","tier":"頂級","src":"weapon_28.png"}
];

const rarityRates={
  '普通':39.264,
  '稀有':49.7,
  '史詩':7.1,
  '罕見':3.3,
  '傳說':0.4,
  '神話':0.22,
  '遠古':0.016
};

const qualityRates={
  '普通':{'低級':40,'中級':30,'高級':20,'頂級':10},
  '稀有':{'低級':40,'中級':30,'高級':20,'頂級':10},
  '史詩':{'低級':40,'中級':30,'高級':20,'頂級':10},
  '罕見':{'低級':40,'中級':30,'高級':20,'頂級':10},
  '傳說':{'低級':40,'中級':30,'高級':20,'頂級':10},
  '神話':{'低級':40,'中級':33,'高級':20,'頂級':7},
  '遠古':{'低級':50,'中級':30,'高級':15,'頂級':5}
};

const raritySeriesMap={
  '普通':'白色系列',
  '稀有':'藍色系列',
  '史詩':'紫色系列',
  '罕見':'橘色系列',
  '傳說':'綠色系列',
  '神話':'紅色系列',
  '遠古':'深藍特殊系列'
};

const rarityOrder={
  '遠古':1,
  '神話':2,
  '傳說':3,
  '罕見':4,
  '史詩':5,
  '稀有':6,
  '普通':7
};

const tierOrder={
  '頂級':1,
  '高級':2,
  '中級':3,
  '低級':4
};

function weightedPick(obj){
  const total=Object.values(obj).reduce((a,b)=>a+b,0);

  let r=Math.random()*total;

  for(const key in obj){
    r-=obj[key];
    if(r<=0)return key;
  }

  return Object.keys(obj)[0];
}

function pickWeapon(){

  const rarity=weightedPick(rarityRates);

  const tier=weightedPick(
    qualityRates[rarity]
  );

  const series=raritySeriesMap[rarity];

  const list=weaponPool.filter(
    w=>w.series===series && w.tier===tier
  );

  return {
    ...list[Math.floor(Math.random()*list.length)],
    rarity
  };
}

function draw(times){

  const items=[];

  for(let i=0;i<times;i++){
    items.push(pickWeapon());
  }

  const merged={};

  items.forEach(item=>{

    if(!merged[item.id]){

      merged[item.id]={
        ...item,
        count:0
      };

    }

    merged[item.id].count++;

  });

  const result=Object.values(merged).sort((a,b)=>{

    const rd=
      rarityOrder[a.rarity]-
      rarityOrder[b.rarity];

    if(rd!==0)return rd;

    const td=
      tierOrder[a.tier]-
      tierOrder[b.tier];

    if(td!==0)return td;

    return a.id-b.id;

  });

  document.getElementById('resultGrid').innerHTML=
    result.map(item=>`

      <div class="itemWrap">

        <img src="${item.src}">

        <div class="count">
          ${item.count.toLocaleString()}
        </div>

        <div class="rarityTag">
          ${item.rarity}${item.tier}
        </div>

      </div>

    `).join('');

}

draw(5000);

</script>

</body>
</html>
