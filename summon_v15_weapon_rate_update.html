<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
<title>召喚模擬器 V15｜官方二段式機率版</title>

<style>
*{box-sizing:border-box}

html,body{
  margin:0;width:100%;height:100%;
  background:#05070d;
  font-family:"Microsoft JhengHei",Arial,sans-serif;
  overflow:hidden;color:#fff;
}

.wrap{
  width:100vw;height:100vh;
  display:flex;
  align-items:flex-start;
  justify-content:center;
  background:#05070d;
  overflow:hidden;
}

.stage{
  position:relative;
  width:100vw;height:100vh;
  overflow:hidden;
  background:
    radial-gradient(circle at 50% 44%,rgba(126,77,255,.72),rgba(37,18,92,.82) 42%,rgba(8,7,24,1) 82%),
    linear-gradient(180deg,#111034,#674bd2);
}

.stars{
  position:absolute;inset:0;opacity:.42;
  background-image:
    radial-gradient(circle,rgba(255,255,255,.9) 0 1px,transparent 2px),
    radial-gradient(circle,rgba(255,255,255,.55) 0 1px,transparent 2px);
  background-size:96px 76px,150px 118px;
}

.top{
  position:absolute;left:2.7%;right:2.6%;top:2.6%;
  height:7%;
  display:flex;align-items:center;justify-content:space-between;
  z-index:5;
}

.leftTitle{
  display:flex;align-items:center;gap:1.2vw;
  font-size:clamp(18px,2vw,34px);
  font-weight:900;
  text-shadow:0 2px 4px rgba(0,0,0,.55);
}

.back{
  font-size:clamp(32px,4vw,58px);
  line-height:1;
  font-weight:900;
}

.currency{
  display:flex;align-items:center;gap:2vw;
  font-size:clamp(14px,1.45vw,25px);
  font-weight:900;
  text-shadow:0 2px 4px rgba(0,0,0,.55);
}

.tabs{
  position:absolute;left:2.5%;top:17%;width:17%;
  display:flex;flex-direction:column;gap:1.2vh;
  z-index:4;
}

.tab{
  height:clamp(44px,8.2vh,86px);
  border:0;border-radius:14px;
  background:rgba(0,0,0,.34);
  color:#fff;
  font-size:clamp(14px,1.25vw,22px);
  font-weight:900;
  box-shadow:inset 0 1px rgba(255,255,255,.2),0 4px 8px rgba(0,0,0,.24);
  cursor:pointer;
  text-align:left;
  padding-left:1.2vw;
}

.tab.active{
  background:linear-gradient(180deg,#31d8e9,#078ba8);
  box-shadow:0 0 18px rgba(44,223,255,.55);
}

.centerHint{
  position:absolute;
  left:23%;right:6%;top:16%;bottom:22%;
  border-radius:18px;
  background:rgba(0,0,0,.08);
  display:flex;
  align-items:center;
  justify-content:center;
  color:rgba(255,255,255,.72);
  font-size:clamp(18px,2vw,32px);
  font-weight:900;
  text-shadow:0 2px 5px rgba(0,0,0,.5);
}

.bottom{
  position:absolute;
  left:16.5%;right:8%;bottom:5.5%;
  height:13.5%;
  border-radius:16px;
  background:rgba(84,72,128,.58);
  display:flex;
  align-items:center;
  justify-content:center;
  padding:0 2%;
  gap:1.2vw;
  z-index:4;
}

.levelBox{
  width:28%;
  min-width:210px;
}

.levelTop{
  display:flex;
  align-items:center;
  gap:1.2vw;
  font-size:clamp(14px,1.25vw,22px);
  font-weight:900;
  margin-bottom:.65vh;
}

.lv{
  color:#ffd84d;
  font-size:clamp(18px,1.7vw,30px);
}

.bar{
  height:clamp(7px,1vh,12px);
  background:#20222b;
  border-radius:999px;
  overflow:hidden;
  border:2px solid rgba(0,0,0,.45);
}

.fill{
  height:100%;
  width:88%;
  background:#ffd83b;
}

.btn{
  height:52%;
  min-width:17%;
  border:0;
  border-radius:10px;
  color:#fff;
  font-size:clamp(15px,1.45vw,26px);
  font-weight:900;
  cursor:pointer;
  box-shadow:inset 0 2px rgba(255,255,255,.28),0 4px 8px rgba(0,0,0,.25);
}

.free{
  background:linear-gradient(#ddd,#aaa);
  opacity:.75;
  color:white;
}

.once{
  background:linear-gradient(#18d0e3,#078eae);
}

.ten{
  background:linear-gradient(#c8f218,#88c500);
}

.cost{
  font-size:clamp(12px,1vw,18px);
  margin-right:.6vw;
}

/* 彈窗 */

.modalMask{
  padding:20px;
  position:absolute;
  inset:0;
  background:rgba(0,0,0,.62);
  display:none;
  align-items:center;
  justify-content:center;
  z-index:20;
}

.modal{
  width:min(680px,72vw);
  min-height:34%;
  background:#f4f4f4;
  color:#333;
  border:3px solid #333;
  border-radius:0 0 16px 16px;
  box-shadow:0 4px 0 rgba(255,255,255,.4) inset,0 8px 22px rgba(0,0,0,.45);
  overflow:visible;
}

.modalHead{
  height:46px;
  background:linear-gradient(#6d6d6d,#252525);
  color:white;
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:900;
  position:relative;
}

.modalX{
  position:absolute;
  right:14px;
  top:50%;
  transform:translateY(-50%);
  font-size:32px;
  cursor:pointer;
}

.modalBody{
  padding:28px 24px 26px;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:18px;
  font-weight:900;
}

.row{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:10px;
  width:100%;
  flex-wrap:wrap;
  font-size:clamp(13px,1.05vw,17px);
}

.aqua{
  min-width:46px;
  height:34px;
  padding:0 12px;
  border:2px solid #087989;
  border-radius:8px;
  background:linear-gradient(#28c9da,#0ca2bb);
  color:white;
  font-weight:900;
  cursor:pointer;
}

.slider{
  width:min(220px,28vw);
  accent-color:#777;
}

.summonBtn{
  width:30%;
  min-width:170px;
  height:42px;
  border:2px solid #69a400;
  border-radius:9px;
  background:linear-gradient(#cfff21,#8dd600);
  color:white;
  font-size:17px;
  font-weight:900;
  cursor:pointer;
}

/* 結果 */

.result{
  position:absolute;
  left:18.5%;
  top:11%;
  width:78%;
  height:57%;
  display:none;
  z-index:12;
  background:transparent;
  border-radius:18px;
  flex-direction:column;
  align-items:center;
  justify-content:flex-start;
  overflow:hidden;
  padding:0 1.2% 1.2%;
}

.summary{
  position:relative;
  margin-bottom:16px;
  padding:.45vw 1.1vw;
  border-radius:999px;
  background:rgba(0,0,0,.36);
  color:#ffe56b;
  font-size:clamp(12px,.95vw,17px);
  font-weight:900;
  text-shadow:0 2px 3px rgba(0,0,0,.5);
  white-space:nowrap;
  z-index:2;
}

.resultGrid{
  width:100%;
  max-width:1280px;
  height:calc(100% - 44px);
  margin:0 auto;
  display:grid;
  grid-template-columns:repeat(10,minmax(74px,1fr));
  grid-auto-rows:auto;
  column-gap:clamp(10px,1.25vw,22px);
  row-gap:clamp(10px,1.05vw,18px);
  justify-items:center;
  align-content:start;
  align-items:start;
  overflow:hidden;
  padding-top:0;
}

.itemWrap{
  width:clamp(70px,6.4vw,118px);
  display:flex;
  flex-direction:column;
  align-items:center;
  animation:pop .18s ease both;
}

.itemWrap img{
  width:100%;
  height:auto;
  filter:drop-shadow(0 .25vw .34vw rgba(0,0,0,.72));
}

.count{
  margin-top:4px;
  width:94%;
  height:clamp(18px,1.45vw,26px);
  border-radius:6px;
  background:rgba(28,25,35,.95);
  display:flex;
  align-items:center;
  justify-content:center;
  color:white;
  font-size:clamp(14px,1.12vw,20px);
  font-weight:900;
  text-shadow:0 1px 2px rgba(0,0,0,.65);
}

.rarityTag{
  margin-top:3px;
  padding:2px 6px;
  border-radius:999px;
  background:rgba(0,0,0,.42);
  color:#ffe56b;
  font-size:clamp(9px,.72vw,12px);
  font-weight:900;
  line-height:1.15;
  white-space:nowrap;
  text-shadow:0 1px 2px rgba(0,0,0,.65);
}

.resultClose{
  position:absolute;
  right:1.2%;
  top:1.2%;
  height:28px;
  min-width:56px;
  border:0;
  border-radius:8px;
  background:linear-gradient(#ff7f7f,#d52d2d);
  color:white;
  font-weight:900;
  cursor:pointer;
  font-size:12px;
  z-index:3;
}

.placeholderCard{
  width:86%;
  min-height:50%;
  border:3px solid #81ecff;
  border-radius:20px;
  background:linear-gradient(180deg,#26346b,#101525);
  box-shadow:0 0 30px #44dfff;
  display:flex;
  align-items:center;
  justify-content:center;
  flex-direction:column;
  gap:14px;
  text-align:center;
  font-size:clamp(18px,2vw,32px);
  font-weight:900;
}

.rateInfo{
  position:absolute;
  right:2.2%;
  bottom:2.2%;
  padding:.35vw .7vw;
  border-radius:999px;
  background:rgba(0,0,0,.28);
  color:rgba(255,255,255,.82);
  font-size:clamp(10px,.75vw,13px);
  font-weight:800;
  z-index:6;
  pointer-events:none;
}

@keyframes pop{
  from{opacity:0;transform:translateY(-10px) scale(.86)}
  to{opacity:1;transform:translateY(0) scale(1)}
}

.resultGrid.few{
  grid-template-columns:repeat(auto-fit,minmax(90px,120px));
  justify-content:start;
}

.resultGrid.few .itemWrap{
  width:clamp(82px,7vw,126px);
}

.resultGrid.full .itemWrap{
  width:clamp(66px,5.9vw,108px);
}

@media(max-width:700px){
  .modal{
    width:92%;
    min-height:36%;
  }

  .row{
    gap:6px;
    flex-wrap:wrap;
  }

  .slider{
    width:48vw;
  }

  .aqua{
    min-width:42px;
    height:32px;
    padding:0 9px;
  }

  .result{
    left:18.5%;
    top:11%;
    width:78%;
    height:57%;
    padding:3% 1.2%;
  }

  .summary{
    white-space:normal;
    text-align:center;
    line-height:1.4;
  }

  .resultGrid{
    width:94%;
    grid-template-columns:repeat(auto-fit,minmax(48px,1fr));
    gap:6px;
  }

  .itemWrap{
    width:clamp(44px,12vw,64px);
  }

  .count{
    height:16px;
    font-size:12px;
  }

  .tabs{
    left:2%;
    top:13%;
    width:22%;
  }

  .bottom{
    left:3%;
    right:3%;
    height:15%;
    gap:1vw;
  }

  .levelBox{
    width:28%;
  }

  .btn{
    min-width:18%;
    font-size:12px;
  }
}
</style>
</head>

<body>

<div class="wrap">
  <div class="stage" id="stage">

    <div class="stars"></div>

    <div class="rateInfo" id="rateInfo">
      武器機率：先抽稀有度，再抽低級/中級/高級/頂級
    </div>

    <div class="top">
      <div class="leftTitle">
        <span class="back">‹</span>
        <span id="pageTitle">一般武器召喚</span>
      </div>

      <div class="currency">
        <span>🔷 0</span>
        <span>💎 無限</span>
      </div>
    </div>

    <div class="tabs">
      <button class="tab active" id="tabWeapon" onclick="setMode('weapon')">武器召喚</button>
      <button class="tab" id="tabPartner" onclick="setMode('partner')">同伴召喚</button>
      <button class="tab" id="tabSelect" onclick="setMode('select')">新同伴挑選</button>
    </div>

    <div class="centerHint" id="centerHint">
      點下方按鈕開始召喚
    </div>

    <div class="bottom">
      <div class="levelBox">
        <div class="levelTop">
          <span>召喚等級 ⓘ</span>
          <span class="lv" id="levelText">Lv.18</span>
        </div>
        <div class="bar">
          <div class="fill"></div>
        </div>
      </div>

      <button class="btn free" onclick="draw(1)">觀看廣告</button>

      <button class="btn once" onclick="draw(1)">
        <span class="cost" id="onceCost">💎 1</span>召喚1次
      </button>

      <button class="btn ten" onclick="openModal()">
        <span class="cost" id="multiCost">💎 10</span>一鍵召喚
      </button>
    </div>

    <div class="modalMask" id="modalMask">
      <div class="modal">
        <div class="modalHead">
          一鍵召喚
          <span class="modalX" onclick="closeModal()">×</span>
        </div>

        <div class="modalBody">
          <div id="modalHint">最少召喚10個，以1為單位變更。</div>

          <div class="row">
            <button class="aqua" onclick="setQty(10)">Min</button>
            <button class="aqua" onclick="changeQty(-1)">－</button>

            <span id="amountLeft">10</span>

            <input id="qtyRange" class="slider" type="range" min="10" max="5000" value="10" oninput="setQty(+this.value)">

            <span id="maxText">5000</span>
            <span id="amountTop" style="display:none">10</span>

            <button class="aqua" onclick="changeQty(1)">＋</button>
            <button class="aqua" onclick="setQty(getMax())">Max</button>
          </div>

          <button class="summonBtn" onclick="confirmDraw()">
            💎 <span id="costText">10</span>　召喚
          </button>
        </div>
      </div>
    </div>

    <div class="result" id="result">
      <div class="summary" id="summary"></div>
      <div class="resultGrid" id="resultGrid"></div>
      <button class="resultClose" onclick="closeResult()">關閉</button>
    </div>

  </div>
</div>

<script>
const weaponPool=[
{"id":1,"series":"白色系列","tier":"低級","src":"weapon_01.png"},
{"id":2,"series":"白色系列","tier":"中級","src":"weapon_02.png"},
{"id":3,"series":"白色系列","tier":"高級","src":"weapon_03.png"},
{"id":4,"series":"白色系列","tier":"頂級","src":"weapon_04.png"},

{"id":5,"series":"藍色系列","tier":"低級","src":"weapon_05.png"},
{"id":6,"series":"藍色系列","tier":"中級","src":"weapon_06.png"},
{"id":7,"series":"藍色系列","tier":"高級","src":"weapon_07.png"},
{"id":8,"series":"藍色系列","tier":"頂級","src":"weapon_08.png"},

{"id":9,"series":"紫色系列","tier":"低級","src":"weapon_09.png"},
{"id":10,"series":"紫色系列","tier":"中級","src":"weapon_10.png"},
{"id":11,"series":"紫色系列","tier":"高級","src":"weapon_11.png"},
{"id":12,"series":"紫色系列","tier":"頂級","src":"weapon_12.png"},

{"id":13,"series":"橘色系列","tier":"低級","src":"weapon_13.png"},
{"id":14,"series":"橘色系列","tier":"中級","src":"weapon_14.png"},
{"id":15,"series":"橘色系列","tier":"高級","src":"weapon_15.png"},
{"id":16,"series":"橘色系列","tier":"頂級","src":"weapon_16.png"},

{"id":17,"series":"綠色系列","tier":"低級","src":"weapon_17.png"},
{"id":18,"series":"綠色系列","tier":"中級","src":"weapon_18.png"},
{"id":19,"series":"綠色系列","tier":"高級","src":"weapon_19.png"},
{"id":20,"series":"綠色系列","tier":"頂級","src":"weapon_20.png"},

{"id":21,"series":"紅色系列","tier":"低級","src":"weapon_21.png"},
{"id":22,"series":"紅色系列","tier":"中級","src":"weapon_22.png"},
{"id":23,"series":"紅色系列","tier":"高級","src":"weapon_23.png"},
{"id":24,"series":"紅色系列","tier":"頂級","src":"weapon_24.png"},

{"id":25,"series":"深藍特殊系列","tier":"低級","src":"weapon_25.png"},
{"id":26,"series":"深藍特殊系列","tier":"中級","src":"weapon_26.png"},
{"id":27,"series":"深藍特殊系列","tier":"高級","src":"weapon_27.png"},
{"id":28,"series":"深藍特殊系列","tier":"頂級","src":"weapon_28.png"}
];

const rarityRates={
  '普通':39.264,
  '稀有':49.7,
  '史詩':7.1,
  '罕見':3.3,
  '傳說':0.4,
  '神話':0.22,
  '遠古':0.016
};

const qualityRates={
  '普通':{'低級':40,'中級':30,'高級':20,'頂級':10},
  '稀有':{'低級':40,'中級':30,'高級':20,'頂級':10},
  '史詩':{'低級':40,'中級':30,'高級':20,'頂級':10},
  '罕見':{'低級':40,'中級':30,'高級':20,'頂級':10},
  '傳說':{'低級':40,'中級':30,'高級':20,'頂級':10},
  '神話':{'低級':40,'中級':33,'高級':20,'頂級':7},
  '遠古':{'低級':50,'中級':30,'高級':15,'頂級':5}
};

const raritySeriesMap={
  '普通':'白色系列',
  '稀有':'藍色系列',
  '史詩':'紫色系列',
  '罕見':'橘色系列',
  '傳說':'綠色系列',
  '神話':'紅色系列',
  '遠古':'深藍特殊系列'
};

const rarityOrder={
  '遠古':1,
  '神話':2,
  '傳說':3,
  '罕見':4,
  '史詩':5,
  '稀有':6,
  '普通':7
};

const tierOrder={
  '頂級':1,
  '高級':2,
  '中級':3,
  '低級':4
};

let mode='weapon';
let qty=10;

function getMax(){
  return mode==='weapon' ? 5000 : 100;
}

function getUnitCost(){
  return mode==='weapon' ? 1 : 50;
}

function setMode(m){
  mode=m;

  document.querySelectorAll('.tab').forEach(b=>b.classList.remove('active'));

  document.getElementById(
    m==='weapon'?'tabWeapon':m==='partner'?'tabPartner':'tabSelect'
  ).classList.add('active');

  document.getElementById('pageTitle').textContent =
    m==='weapon' ? '一般武器召喚' :
    m==='partner' ? '召喚同伴' :
    '新同伴挑選召喚';

  document.getElementById('levelText').textContent =
    m==='weapon' ? 'Lv.18' : 'Lv.13';

  document.getElementById('onceCost').textContent =
    m==='weapon' ? '💎 1' : '💎 50';

  document.getElementById('multiCost').textContent =
    m==='weapon' ? '💎 10' : '💎 500';

  document.getElementById('maxText').textContent=getMax().toLocaleString();
  document.getElementById('qtyRange').max=getMax();

  document.getElementById('centerHint').textContent =
    m==='weapon' ? '點下方按鈕開始召喚' : '同伴素材尚未正式加入｜先保留分頁架構';

  const rateInfo=document.getElementById('rateInfo');
  if(rateInfo) rateInfo.style.display = m==='weapon' ? 'block' : 'none';

  setQty(10);
  closeResult();
}

function setQty(v){
  qty=Math.max(10,Math.min(getMax(),Number(v)||10));

  document.getElementById('qtyRange').value=qty;
  document.getElementById('amountLeft').textContent=qty.toLocaleString();
  document.getElementById('amountTop').textContent=qty.toLocaleString();
  document.getElementById('costText').textContent=(qty*getUnitCost()).toLocaleString();
}

function changeQty(n){
  setQty(qty+n);
}

function openModal(){
  setQty(10);
  document.getElementById('modalMask').style.display='flex';
}

function closeModal(){
  document.getElementById('modalMask').style.display='none';
}

function confirmDraw(){
  closeModal();
  draw(qty);
}

function weightedFromObject(rateObj,fallback){
  const total=Object.values(rateObj).reduce((a,b)=>a+b,0);
  let r=Math.random()*total;

  for(const [key,rate] of Object.entries(rateObj)){
    r-=rate;
    if(r<=0)return key;
  }

  return fallback;
}

function pickWeapon(){
  const rarity=weightedFromObject(rarityRates,'普通');
  const tier=weightedFromObject(qualityRates[rarity],'低級');
  const series=raritySeriesMap[rarity];

  const list=weaponPool.filter(w=>w.series===series && w.tier===tier);
  const picked=list[Math.floor(Math.random()*list.length)] || weaponPool[0];

  const finalRate=(
    rarityRates[rarity] * qualityRates[rarity][tier] / 100
  ).toFixed(4).replace(/\.?0+$/,'');

  return {...picked,rarity,finalRate};
}

function draw(times){
  times=Math.max(1,Math.min(getMax(),Number(times)||1));

  if(mode==='weapon'){
    drawWeapon(times);
  }else{
    drawPartnerPlaceholder(times);
  }
}

function drawWeapon(times){
  const items=[];

  for(let i=0;i<times;i++){
    items.push(pickWeapon());
  }

  const merged={};

  items.forEach(item=>{
    if(!merged[item.id]){
      merged[item.id]={...item,count:0};
    }
    merged[item.id].count++;
  });

  const resultItems=Object.values(merged).sort((a,b)=>{
    const rd=rarityOrder[a.rarity]-rarityOrder[b.rarity];
    if(rd!==0)return rd;

    const td=tierOrder[a.tier]-tierOrder[b.tier];
    if(td!==0)return td;

    return a.id-b.id;
  });

  const grid=document.getElementById('resultGrid');
  grid.classList.remove('few','full');

  if(resultItems.length<=20) grid.classList.add('few');
  if(resultItems.length>=24) grid.classList.add('full');

  grid.innerHTML=resultItems.map((item,i)=>`
    <div class="itemWrap" style="animation-delay:${i*0.012}s">
      <img src="${item.src}" alt="${item.rarity}${item.tier}" title="${item.rarity}${item.tier}｜實際 ${item.finalRate}%">
      <div class="count">${item.count.toLocaleString()}</div>
      <div class="rarityTag">${item.rarity}${item.tier}</div>
    </div>
  `).join('');

  document.getElementById('summary').textContent =
    `本次召喚 ${times.toLocaleString()} 抽｜共 ${resultItems.length} 種武器｜官方邏輯：先稀有度，再品質`;

  document.getElementById('centerHint').style.display='none';
  document.getElementById('result').style.display='flex';
}

function drawPartnerPlaceholder(times){
  const grid=document.getElementById('resultGrid');

  grid.innerHTML=`
    <div class="placeholderCard">
      <div>同伴抽獎頁先保留</div>
      <div style="font-size:60%;opacity:.75">
        之後可接同伴素材、機率、累加邏輯
      </div>
      <div style="font-size:55%;color:#ffe56b">
        本次測試召喚：${times.toLocaleString()} 抽
      </div>
    </div>
  `;

  document.getElementById('summary').textContent='同伴頁預留中';
  document.getElementById('centerHint').style.display='none';
  document.getElementById('result').style.display='flex';
}

function closeResult(){
  document.getElementById('result').style.display='none';
  document.getElementById('centerHint').style.display='flex';
}

setMode('weapon');
</script>
