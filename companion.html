const rarityRates={"普通": 75.21, "稀有": 22, "史詩": 2.5, "罕見": 0.25, "傳說": 0.04};
const rarityOrder={傳說:1,罕見:2,史詩:3,稀有:4,普通:5};let summonQty=10;
function weightedPick(obj){const total=Object.values(obj).reduce((a,b)=>a+b,0);let r=Math.random()*total;for(const key in obj){r-=obj[key];if(r<=0)return key;}return Object.keys(obj)[0];}
function pickCompanion(){const rarity=weightedPick(rarityRates);const list=companionPool[rarity];return list[Math.floor(Math.random()*list.length)];}
function draw(times){const result=document.getElementById('result'),centerHint=document.getElementById('centerHint'),grid=document.getElementById('resultGrid'),summary=document.getElementById('summary');result.style.display='flex';centerHint.style.display='none';const pool=[];for(let i=0;i<times;i++)pool.push(pickCompanion());const merged={};pool.forEach(item=>{if(!merged[item.id])merged[item.id]={...item,count:0};merged[item.id].count++;});const final=Object.values(merged).sort((a,b)=>{const r=rarityOrder[a.rarity]-rarityOrder[b.rarity];if(r!==0)return r;return b.count-a.count;});const counts={普通:0,稀有:0,史詩:0,罕見:0,傳說:0};pool.forEach(i=>counts[i.rarity]++);summary.innerHTML=`本次召喚 ${times.toLocaleString()} 抽｜普通 ${counts.普通}｜稀有 ${counts.稀有}｜史詩 ${counts.史詩}｜罕見 ${counts.罕見}｜傳說 ${counts.傳說}`;grid.innerHTML=final.map(item=>`<div class="itemWrap rarity-${item.rarity}"><div class="portrait"><img src="${companionImages[item.id]}" alt="${item.rarity}同伴"></div><div class="count">${item.count.toLocaleString()}</div><div class="rarityTag">${item.rarity}</div></div>`).join('');if(counts.傳說>0)showLegend();}
function showLegend(){const el=document.getElementById('flashLegend');el.classList.add('show');clearTimeout(window.legendTimer);window.legendTimer=setTimeout(()=>el.classList.remove('show'),900);}
function openModal(){document.getElementById('modalMask').style.display='flex';}function closeModal(){document.getElementById('modalMask').style.display='none';}function setQty(v){summonQty=Math.max(10,Math.min(3000,parseInt(v)||10));document.getElementById('qtySlider').value=summonQty;document.getElementById('qtyText').innerText=summonQty.toLocaleString();document.getElementById('costText').innerText=summonQty.toLocaleString();}function changeQty(v){setQty(summonQty+v);}function confirmDraw(){closeModal();draw(summonQty);}setQty(10);
</script></body></html>
