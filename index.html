<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Maple Idle Auto Redeemer</title>

  <style>
    body{
      margin:0;
      background:#0f172a;
      color:white;
      font-family:Arial,"Noto Sans TC",sans-serif;
      display:flex;
      align-items:center;
      justify-content:center;
      min-height:100vh;
      overflow:hidden;
    }

    .bg{
      position:fixed;
      inset:0;
      background:
      radial-gradient(circle at top left,#f9731630,transparent 30%),
      radial-gradient(circle at bottom right,#ec489930,transparent 30%);
    }

    .card{
      position:relative;
      z-index:2;
      width:90%;
      max-width:760px;
      background:rgba(255,255,255,.05);
      backdrop-filter:blur(18px);
      border:1px solid rgba(255,255,255,.08);
      border-radius:32px;
      padding:60px;
      text-align:center;
      box-shadow:0 20px 80px rgba(0,0,0,.45);
    }

    h1{
      font-size:64px;
      margin:0;
      font-weight:900;
      letter-spacing:-2px;
    }

    .gradient{
      background:linear-gradient(90deg,#f97316,#ec4899);
      -webkit-background-clip:text;
      -webkit-text-fill-color:transparent;
    }

    p{
      margin-top:24px;
      font-size:20px;
      color:#cbd5e1;
      line-height:1.8;
    }

    .buttons{
      margin-top:40px;
      display:flex;
      gap:18px;
      justify-content:center;
      flex-wrap:wrap;
    }

    a{
      text-decoration:none;
      color:white;
      font-weight:800;
      padding:18px 34px;
      border-radius:20px;
      transition:.2s;
    }

    a:hover{
      transform:translateY(-2px);
    }

    .install{
      background:linear-gradient(135deg,#f97316,#ec4899);
      box-shadow:0 10px 30px rgba(249,115,22,.3);
    }

    .official{
      background:#1e293b;
      border:1px solid rgba(255,255,255,.08);
    }

    .footer{
      margin-top:40px;
      font-size:14px;
      color:#64748b;
      line-height:1.8;
    }
  </style>
</head>

<body>

<div class="bg"></div>

<div class="card">

  <h1>
    🍁 Maple Idle
    <span class="gradient">Auto Redeemer</span>
  </h1>

  <p>
    MapleStory Idle 官方頁批次兌換工具<br>
    支援 UID 保存、自動確認、自動關閉彈窗。
  </p>

  <div class="buttons">

    <a class="install"
    href="https://addons.mozilla.org/zh-TW/firefox/addon/tampermonkey/"
    target="_blank">

      🦊 安裝 Tampermonkey

    </a>

    <a class="install"
    href="https://raw.githubusercontent.com/Taishiang/maple-idle-auto-redeemer/main/maple-idle.user.js">

      🚀 安裝腳本

    </a>

    <a class="official"
    href="https://mcoupon.nexon.com/maplestoryidle?lang=zh-TW"
    target="_blank">

      🔗 官方兌換頁

    </a>

  </div>

  <div class="footer">
    ① 先安裝 Tampermonkey<br>
    ② 安裝 Maple Idle Auto Redeemer 腳本<br>
    ③ 打開官方兌換頁即可自動出現 UI<br><br>

    此工具為非官方玩家輔助工具
  </div>

</div>

</body>
</html>
