<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Maple Idle 升級分析器</title>
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
<style>
body{margin:0;min-height:100vh;background:#0f172a;color:white;font-family:Arial,"Noto Sans TC",sans-serif;display:flex;align-items:center;justify-content:center;padding:18px}
.card{width:100%;max-width:760px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:28px;padding:30px;text-align:center;box-shadow:0 20px 80px rgba(0,0,0,.45)}
h1{font-size:32px;margin:0}.sub{color:#cbd5e1;line-height:1.8;margin:16px 0 24px}.back{display:inline-block;margin-bottom:22px;color:white;text-decoration:none;background:#1e293b;padding:12px 18px;border-radius:14px;font-weight:800}
input,select{width:100%;padding:15px;border-radius:16px;border:1px solid rgba(255,255,255,.12);background:rgba(255,255,255,.08);color:white;font-size:16px;box-sizing:border-box;margin-top:10px}
button{width:100%;margin-top:16px;border:0;border-radius:18px;padding:17px;font-size:19px;font-weight:900;color:white;background:linear-gradient(135deg,#06b6d4,#3b82f6);cursor:pointer}
.preview{display:none;width:100%;max-height:360px;object-fit:contain;margin-top:18px;border-radius:18px}.status{margin-top:18px;color:#facc15;line-height:1.8}
.result{margin-top:22px;padding:24px;border-radius:24px;background:rgba(6,182,212,.14);border:1px solid rgba(103,232,249,.35)}.big{font-size:42px;font-weight:900;color:#67e8f9;margin-top:10px}
.detail{margin-top:14px;color:#dbeafe;line-height:1.9;font-size:15px}.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:12px}.manual{display:none;margin-top:18px;padding:16px;border-radius:18px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);text-align:left}.manual label{font-size:13px;color:#cbd5e1}.debug{margin-top:18px;text-align:left;background:rgba(0,0,0,.25);border-radius:16px;padding:14px;color:#94a3b8;font-size:13px;line-height:1.6;display:none;white-space:pre-wrap}.smallBtn{background:#334155;font-size:14px;padding:12px}.warn{color:#facc15}.ok{color:#86efac}@media(max-width:560px){.card{padding:22px}.grid{grid-template-columns:1fr}.big{font-size:34px}}
</style>
</head>
<body>
<div class="card">
<a class="back" href="index.html">← 回首頁</a>
<h1>📊 Maple Idle 升級分析器</h1>
<div class="sub">上傳「自動狩獵概況」截圖，用 <b>上線時間 + EXP 增加量</b> 計算升級時間。</div>
<input type="file" id="imageUpload" accept="image/*">
<img id="preview" class="preview">
<button onclick="analyzeImage()">開始分析圖片</button>
<div class="status" id="status">請先上傳遊戲截圖</div>
<div class="result">
  <div>預估剩餘升級時間</div>
  <div class="big" id="main">尚未分析</div>
  <div class="detail" id="detail"></div>
</div>
<button class="smallBtn" onclick="toggleManual()">手動修正 / 分鐘小時模式</button>
<div class="manual" id="manual">
  <div class="grid">
    <div><label>等級</label><input id="mLevel" placeholder="例如 106"></div>
    <div><label>目前 EXP %</label><input id="mCurrent" placeholder="例如 34.714"></div>
    <div><label>上線前 EXP %</label><input id="mBefore" placeholder="例如 34.645"></div>
    <div><label>上線時間</label><input id="mTime" placeholder="00:20:52 或 20分"></div>
    <div><label>怪物總數</label><input id="mMonsters" placeholder="例如 2200"></div>
    <div><label>自訂效率模式</label><select id="mMode"><option value="time">用上線時間計算</option><option value="hour">我直接輸入每小時%</option><option value="minute">我直接輸入每分鐘%</option></select></div>
    <div><label>每小時/每分鐘 EXP%</label><input id="mRate" placeholder="選自訂模式才填"></div>
  </div>
  <button onclick="analyzeManual()">套用手動資料</button>
</div>
<button class="smallBtn" onclick="copyResult()">一鍵複製結果</button>
<button class="smallBtn" onclick="toggleDebug()">查看辨識文字</button>
<div class="debug" id="debug"></div>
</div>
<script>
let uploadedFile=null,lastText='',lastShare='';
document.getElementById('imageUpload').addEventListener('change',e=>{
  uploadedFile=e.target.files[0]; if(!uploadedFile)return;
  const img=document.getElementById('preview'); img.src=URL.createObjectURL(uploadedFile); img.style.display='block';
  document.getElementById('status').innerText='圖片已上傳，請按「開始分析圖片」';
});
function toggleDebug(){const b=document.getElementById('debug');b.style.display=b.style.display==='block'?'none':'block'}
function toggleManual(){const b=document.getElementById('manual');b.style.display=b.style.display==='block'?'none':'block'}
async function analyzeImage(){
 if(!uploadedFile){alert('請先上傳圖片');return}
 const status=document.getElementById('status');
 status.innerText='辨識固定 UI 區塊中...';

 try{
  const zones=await makeOCRCanvases(uploadedFile);
  const texts={};
  let debugText='';

  for(let i=0;i<zones.length;i++){
    const z=zones[i];
    status.innerText=`辨識 ${z.name} ${i+1}/${zones.length}...`;

    const result=await Tesseract.recognize(
      z.canvas,
      'eng',
      {
        tessedit_char_whitelist:'0123456789.,:%LvVPLAYTIMEEXP() ',
        logger:m=>{
          if(m.status==='recognizing text'){
            status.innerText=`辨識 ${z.name}：${Math.round(m.progress*100)}%`;
          }
        }
      }
    );

    texts[z.key]=result.data.text;
    debugText += `\n\n[${z.name}]\n${result.data.text}`;
  }

  lastText=debugText;
  document.getElementById('debug').innerText=debugText;

  const data=parseFixedZones(texts);

  if(!data.ok){
    status.innerText='辨識不完整，請用手動修正';
    document.getElementById('main').innerText='需要修正';
    document.getElementById('detail').innerHTML=data.reason;
    document.getElementById('manual').style.display='block';
    fillManual(data);
    return;
  }

  showResult(data,'OCR固定UI');
 }catch(err){
  console.error(err);
  status.innerText='分析失敗，請重新上傳較清楚的圖片';
  document.getElementById('main').innerText='分析失敗';
  document.getElementById('manual').style.display='block';
 }
}

function fillManual(data){ if(!data)return; if(data.level) mLevel.value=data.level; if(data.current) mCurrent.value=data.current; if(data.before) mBefore.value=data.before; if(data.playtimeText) mTime.value=data.playtimeText; if(data.monsters) mMonsters.value=data.monsters; }
function analyzeManual(){
 const mode=mMode.value; const level=num(mLevel.value); const current=num(mCurrent.value); const before=num(mBefore.value); const monsters=num(mMonsters.value)||0; const hours=parseTimeToHours(mTime.value);
 const rate=num(mRate.value);
 let data={ok:true,level:level||null,nextLevel:level?level+1:null,current,before,after:current,hours,monsters,monsterPerMinuteFromOCR:null,playtimeText:mTime.value||'手動'};
 if(mode==='hour'){data.manualPerHour=rate}else if(mode==='minute'){data.manualPerHour=rate*60}
 if(!isFinite(current)||current<0||current>100){alert('請輸入目前 EXP %');return}
 if(mode==='time' && (!isFinite(before)||!isFinite(hours)||hours<=0)){alert('請輸入上線前 EXP % 與上線時間');return}
 if(mode!=='time' && (!isFinite(rate)||rate<=0)){alert('請輸入每小時或每分鐘 EXP%');return}
 showResult(data,'手動');
}
function showResult(data,source){
 const calc=calculate(data); document.getElementById('status').innerText='分析完成';
 document.getElementById('main').innerText=calc.timeText;
 const shortSample=data.hours && data.hours<0.5 ? '<br><span class="warn">提醒：樣本低於 30 分鐘，建議掛滿 1 小時以上會更準。</span>' : '';
 const lvText = data.level && data.level <= 250 ? `${data.level} → ${data.level + 1}` : '? → ?';
 document.getElementById('detail').innerHTML=`
 等級：<b>${lvText}</b><br>
 目前 EXP：<b>${fmt(data.current)}%</b><br>
 效率：約 <b>${fmt(calc.perHour,3)}% / 小時</b>，一天約 <b>${fmt(calc.perDay,2)}%</b><br>
 上線時間：<b>${data.playtimeText||'?'}</b><br>
 每分鐘：約 <b>${fmt(calc.monsterPerMinute,1)}</b> 隻， 每小時：約 <b>${fmt(calc.monsterPerHour,0)}</b> 隻
 ${shortSample}
 `;
 lastShare=`Maple Idle 升級分析\n目前：${data.level && data.level <= 250 ? `Lv.${data.level} → Lv.${data.level + 1}` : 'Lv.?'} ${fmt(data.current)}%\n效率：約 ${fmt(calc.perHour,3)}%/小時\n預估升級：${calc.timeText}\n上線時間：${data.playtimeText||'?'}`;
 saveHistory(data,calc,source);
}
function loadImage(file){return new Promise(resolve=>{const img=new Image();img.onload=()=>resolve(img);img.src=URL.createObjectURL(file)})}
async function makeOCRCanvases(file){
 const img=await loadImage(file);
 const list=[];

 function add(key,name,x,y,w,h,scale){
   list.push({
     key,
     name,
     canvas:makeCanvas(img,img.width*x,img.height*y,img.width*w,img.height*h,scale)
   });
 }

 // UI 固定座標：只抓需要的區塊，不再搜尋獲得道具列表
 // 右側自動狩獵概況上方數字：每分鐘怪物 / 或目前怪物總數
 add('monsterRate','怪物數/每分鐘數',0.86,0.245,0.11,0.055,10);

 // PLAYTIME
 add('playtime','上線時間',0.60,0.335,0.16,0.075,9);

 // 右側等級 + EXP，包含 Lv.106、34.645%、34.862%
 add('levelExp','右側等級EXP',0.81,0.325,0.17,0.085,10);

 // 底部角色等級，備援用
 add('bottomLevel','底部角色等級',0.405,0.760,0.12,0.055,10);

 // 底部目前 EXP，備援用
 add('bottomExp','底部目前EXP',0.02,0.925,0.33,0.055,9);

 return list;
}
function makeCanvas(img,x,y,w,h,scale){
 const canvas=document.createElement('canvas'); canvas.width=w*scale; canvas.height=h*scale; const ctx=canvas.getContext('2d');
 ctx.drawImage(img,x,y,w,h,0,0,canvas.width,canvas.height);
 const imageData=ctx.getImageData(0,0,canvas.width,canvas.height),d=imageData.data;
 for(let i=0;i<d.length;i+=4){const gray=d[i]*.299+d[i+1]*.587+d[i+2]*.114; const high=gray>125?255:0; d[i]=d[i+1]=d[i+2]=high}
 ctx.putImageData(imageData,0,0); return canvas;
}

function parseFixedZones(texts){
 const levelExpText = cleanOCR(texts.levelExp || '');
 const bottomLevelText = cleanOCR(texts.bottomLevel || '');
 const bottomExpText = cleanOCR(texts.bottomExp || '');
 const monsterText = cleanOCR(texts.monsterRate || '');
 const timeText = cleanOCR(texts.playtime || '');

 // 等級：優先抓右側 Lv，抓不到再抓底部 Lv
 let level =
   getLevelFromText(levelExpText) ||
   getLevelFromText(bottomLevelText);

 // 有些 OCR 只會讀到 106，沒有 Lv；因為這些區塊是固定等級區，所以可接受 2~3 位數
 if(!level){
   level = firstReasonableLevel(levelExpText) || firstReasonableLevel(bottomLevelText);
 }

 // EXP：右側通常有兩個百分比：上線前與目前
 let expList = getPercents(levelExpText);

 // 底部目前 EXP 備援
 const bottomPercents = getPercents(bottomExpText);
 if(bottomPercents.length){
   const bottomCurrent = bottomPercents[bottomPercents.length-1];
   if(!expList.some(x=>Math.abs(x-bottomCurrent)<0.02)){
     expList.push(bottomCurrent);
   }
 }

 expList = expList
   .filter(x=>isFinite(x)&&x>=0&&x<=100)
   .sort((a,b)=>a-b);

 let before = null;
 let current = null;

 if(expList.length >= 2){
   before = expList[0];
   current = expList[expList.length-1];
 }else if(expList.length === 1){
   current = expList[0];
 }

 // 上線時間
 const parsedTime = parsePlayTime(timeText);
 const hours = parsedTime.hours;
 const playtimeText = parsedTime.text;

 // 怪物數/每分鐘數：這個固定區塊只會有上方那個數字，不碰道具列表
 const monsterNumber = firstNumber(monsterText);
 let monsters = 0;
 let monsterPerMinuteFromOCR = null;

 if(isFinite(monsterNumber)){
   // 小數幾乎就是「每分鐘狩獵怪物數量」，例如 106.6
   if(String(monsterNumber).includes('.') || monsterNumber < 1000){
     monsterPerMinuteFromOCR = Number(monsterNumber);
     if(hours) monsters = monsterPerMinuteFromOCR * hours * 60;
   }else{
     monsters = Number(monsterNumber);
   }
 }

 if(!isFinite(current) || !isFinite(before)){
   return {
     ok:false,
     reason:'固定區塊找不到兩個 EXP 百分比',
     level,
     current,
     before,
     hours,
     monsters,
     monsterPerMinuteFromOCR,
     playtimeText
   };
 }

 if(!isFinite(hours) || hours <= 0){
   return {
     ok:false,
     reason:'固定區塊找不到 PLAYTIME / 上線時間',
     level,
     current,
     before,
     hours,
     monsters,
     monsterPerMinuteFromOCR,
     playtimeText
   };
 }

 return {
   ok:true,
   level,
   nextLevel:level ? level + 1 : null,
   current,
   before,
   after:current,
   hours,
   monsters,
   monsterPerMinuteFromOCR,
   playtimeText
 };
}

function cleanOCR(t){
 return String(t||'')
   .replace(/[，]/g,'.')
   .replace(/[Oo]/g,'0')
   .replace(/\s+/g,' ')
   .trim();
}

function getLevelFromText(t){
 const m = String(t).match(/L\s*v?\s*\.?\s*(\d{1,3})/i);
 if(!m) return null;
 const n = Number(m[1]);
 return n>=1 && n<=250 ? n : null;
}

function firstReasonableLevel(t){
 const nums = String(t).match(/\b\d{2,3}\b/g) || [];
 for(const x of nums){
   const n = Number(x);
   if(n>=1 && n<=250 && ![12,13,14,15,16,20,28,49,65,80].includes(n)){
     return n;
   }
 }
 return null;
}

function getPercents(t){
 const arr = [];
 const matches = String(t).match(/\d{1,3}[\.,]\d{1,3}\s*%?/g) || [];
 matches.forEach(x=>{
   const n = Number(x.replace('%','').replace(',','.').trim());
   if(isFinite(n) && n>=0 && n<=100) arr.push(n);
 });
 return [...new Set(arr.map(x=>Number(x.toFixed(3))))];
}

function parsePlayTime(t){
 const m = String(t).match(/(\d{1,3})[:：](\d{2})[:：](\d{2})/);
 if(!m) return {hours:null,text:''};
 const h=Number(m[1]), mi=Number(m[2]), s=Number(m[3]);
 return {
   hours:h+mi/60+s/3600,
   text:`${String(h).padStart(2,'0')}:${String(mi).padStart(2,'0')}:${String(s).padStart(2,'0')}`
 };
}

function firstNumber(t){
 const m = String(t).match(/\d{1,7}(?:[\.,]\d+)?/);
 if(!m) return NaN;
 return Number(m[0].replace(',','.'));
}

function parseMapleText(text){
 const cleaned=text.replace(/[，]/g,'.').replace(/O/g,'0').replace(/o/g,'0').replace(/\s+/g,' ');
 let levels=[], lvPercents=[];
 const lvRe=/Lv\.?\s*(\d{1,3})[^0-9]{0,20}\(?\s*(\d{1,3}[\.,]\d{1,3})\s*%?\s*\)?/gi; let m;
 while((m=lvRe.exec(cleaned))!==null){levels.push(Number(m[1])); lvPercents.push(Number(m[2].replace(',','.')))}
 const allPerc=(cleaned.match(/\d{1,3}[\.,]\d{1,3}\s*%/g)||[]).map(x=>Number(x.replace('%','').replace(',','.'))).filter(x=>isFinite(x)&&x>=0&&x<=100);
 let before=null,current=null;
 if(lvPercents.length>=2){before=lvPercents[0];current=lvPercents[lvPercents.length-1]}
 else if(allPerc.length>=2){
   // 只取最接近的一組百分比，避免 3.645 / 34.714 誤判
   let best=null;
   for(let i=0;i<allPerc.length;i++)for(let j=i+1;j<allPerc.length;j++){const diff=Math.abs(allPerc[j]-allPerc[i]); if(diff>0 && diff<10 && (!best||diff<best.diff)) best={a:allPerc[i],b:allPerc[j],diff}}
   if(best){before=Math.min(best.a,best.b); current=Math.max(best.a,best.b)}
 }
 const t=cleaned.match(/(\d{1,2})[:：](\d{2})[:：](\d{2})/); let hours=null,playtimeText='';
 if(t){const h=Number(t[1]),mi=Number(t[2]),s=Number(t[3]); hours=h+mi/60+s/3600; playtimeText=`${String(h).padStart(2,'0')}:${String(mi).padStart(2,'0')}:${String(s).padStart(2,'0')}`}
 // 怪物數：遊戲有兩種顯示
 // A. 目前狩獵的怪物數量 2200 ＝總怪物數
 // B. 每分鐘狩獵的怪物數量 106.6 ＝每分鐘怪物數
 let monsters=0;
 let monsterPerMinuteFromOCR=null;

 // 注意：OCR 白名單沒有中文，所以「每分鐘」常常辨識不到，只會看到 106.6
 // 因此先找「不是 EXP 的小數」，例如 106.6，當作每分鐘怪物數
 const decimalNumbers = (cleaned.match(/\b\d{1,4}[\.,]\d{1,3}\b/g)||[])
   .map(x=>Number(x.replace(',','.')))
   .filter(x=>isFinite(x));

 // 排除 EXP 百分比，例如 34.645 / 34.862
 const expDecimals = [];
 if(isFinite(before)) expDecimals.push(before);
 if(isFinite(current)) expDecimals.push(current);
 lvPercents.forEach(x=>expDecimals.push(x));

 const monsterRateCandidates = decimalNumbers.filter(x=>{
   const isExp = expDecimals.some(e=>Math.abs(e-x)<0.02);
   return !isExp && x > 0 && x < 1000;
 });

 // 若有 106.6 這種小數，直接視為每分鐘怪物數
 if(monsterRateCandidates.length){
   // 通常第一個就是右側黑框上面的「每分鐘狩獵怪物數量」
   monsterPerMinuteFromOCR = monsterRateCandidates[0];
 }

 // 總怪物數模式：只有沒有每分鐘數值時才抓總數
 if(!monsterPerMinuteFromOCR){
   const totalMonsterPattern = cleaned.match(/(?:total|hunted|monster|MONSTER)[^0-9]{0,40}(\d{3,9}(?:,\d{3})*)/i);
   if(totalMonsterPattern){
     monsters = Number(totalMonsterPattern[1].replace(/,/g,''));
   }

   if(!monsters){
     const nums=(cleaned.match(/\b\d{4,7}\b/g)||[])
       .map(x=>Number(x.replace(/,/g,'')))
       .filter(x=>x>=1000&&x<9999999);
     monsters=nums.length?nums[0]:0;
   }
 }

 // 如果是每分鐘模式，反推總怪物數，避免後面歷史紀錄沒值
 if(monsterPerMinuteFromOCR && hours){
   monsters = monsterPerMinuteFromOCR * hours * 60;
 }
 // 等級：只認紅框區常見的 Lv.xxx，不用最大值，避免抓到 Stage / 物品數量 / 319
 let levelCandidates = [];

 // Lv.106 / LV 106 / L v 106 都抓
 const lvTextMatches = cleaned.match(/L\s*v?\s*\.?\s*\d{1,3}/gi)||[];
 lvTextMatches.forEach(x=>{
   const n = Number((x.match(/\d{1,3}/)||[])[0]);
   if(isFinite(n)) levelCandidates.push(n);
 });

 // Lv + EXP 旁邊抓到的等級也加入候選
 levels.forEach(n=>levelCandidates.push(n));

 // 合理等級範圍：排除 319 / 320 這種 OCR 誤判
 levelCandidates = levelCandidates.filter(x => x >= 1 && x <= 250);

 // 排除常見干擾：Stage 13、道具數量、時間碎片
 levelCandidates = levelCandidates.filter(x => ![12,13,14,15,16,28,49,65,80].includes(x));

 // 同一等級通常會在右側與下方都出現，優先取出現次數最多者
 let level = null;
 if(levelCandidates.length){
   const counts = {};
   levelCandidates.forEach(n=>counts[n]=(counts[n]||0)+1);
   level = Number(
     Object.keys(counts).sort((a,b)=>counts[b]-counts[a] || Number(a)-Number(b))[0]
   );
 }

 if(!isFinite(current)||!isFinite(before)) return {ok:false,reason:'找不到 Lv 旁邊的兩個 EXP 百分比',level,current,before,hours,monsters,monsterPerMinuteFromOCR,playtimeText};
 if(!isFinite(hours)||hours<=0) return {ok:false,reason:'找不到 PLAYTIME / 上線時間',level,current,before,hours,monsters,monsterPerMinuteFromOCR,playtimeText};

 // nextLevel 不再吃 OCR 第二個等級，永遠用目前等級 + 1
 return {ok:true,level,nextLevel:level?level+1:null,current,before,after:current,hours,monsters,monsterPerMinuteFromOCR,playtimeText};
}
function calculate(data){
 const perHour=data.manualPerHour || ((data.current-data.before)/data.hours);
 const remain=100-data.current;

 if(perHour<=0||remain<=0){
   return{
     timeText:'已達標或資料錯誤',
     perHour:0,
     perDay:0,
     monsterPerMinute:0,
     monsterPerHour:0
   };
 }

 const needHours=remain/perHour;
 const days=Math.floor(needHours/24);
 const hours=needHours-days*24;

 let monsterPerMinute=0;
 let monsterPerHour=0;

 // 如果遊戲畫面顯示的是「每分鐘狩獵怪物數量」，直接採用，不再除以上線時間
 if(data.monsterPerMinuteFromOCR){
   monsterPerMinute=data.monsterPerMinuteFromOCR;
   monsterPerHour=monsterPerMinute*60;
 }else{
   monsterPerHour=data.hours?data.monsters/data.hours:0;
   monsterPerMinute=monsterPerHour/60;
 }

 return{
   timeText:`約 ${days} 天 ${hours.toFixed(1)} 小時`,
   perHour,
   perDay:perHour*24,
   monsterPerHour,
   monsterPerMinute
 };
}
function parseTimeToHours(v){v=(v||'').trim(); const hms=v.match(/(\d{1,3})[:：](\d{1,2})[:：](\d{1,2})/); if(hms)return Number(hms[1])+Number(hms[2])/60+Number(hms[3])/3600; const min=v.match(/(\d+(?:\.\d+)?)\s*(分|m|min)/i); if(min)return Number(min[1])/60; const hr=v.match(/(\d+(?:\.\d+)?)\s*(小時|h|hr)/i); if(hr)return Number(hr[1]); return Number(v)}
function num(v){return Number(String(v||'').replace('%','').replace(',','.').replace(/[^\d.]/g,''))}
function fmt(n,d=3){return isFinite(n)?Number(n).toFixed(d).replace(/\.?0+$/,''):'?'}
function copyResult(){if(!lastShare){alert('尚未有結果');return} navigator.clipboard.writeText(lastShare); alert('已複製結果')}
function saveHistory(data,calc,source){const key='mapleLevelHistoryV4'; const arr=JSON.parse(localStorage.getItem(key)||'[]'); arr.unshift({time:new Date().toLocaleString(),source,level:data.level,current:data.current,perHour:calc.perHour,remain:calc.timeText}); localStorage.setItem(key,JSON.stringify(arr.slice(0,20)))}
</script>
