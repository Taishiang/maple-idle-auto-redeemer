<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>掛機效率分析器</title>

<style>
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial;background:#f5f7fb;color:#111827}
.container{max-width:480px;margin:auto;padding:20px}
.homeBtn{display:inline-block;margin-bottom:14px;padding:10px 14px;background:#4f7cff;color:#fff;text-decoration:none;border-radius:10px;font-weight:700}
h2{text-align:center;margin:8px 0 18px}
.card{background:#fff;border-radius:14px;padding:16px;margin-bottom:14px;box-shadow:0 4px 14px rgba(0,0,0,.06)}
.upload{text-align:center;padding:18px;border:2px dashed #d1d5db;border-radius:12px;cursor:pointer;font-weight:700}
#preview{display:none;width:100%;margin-top:12px;border-radius:10px}
.progress{height:10px;background:#e5e7eb;border-radius:999px;overflow:hidden}
.bar{height:100%;width:0%;background:linear-gradient(90deg,#4f7cff,#34c759);transition:.4s}
.progress-text{font-size:12px;color:#666;text-align:right;margin-top:6px}
.main{font-size:28px;font-weight:800;color:#4f7cff;text-align:center;margin:10px 0}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.box{background:#f9fafb;padding:10px;border-radius:10px;text-align:center}
.title{font-size:12px;color:#666}
.value{font-size:16px;font-weight:700}
button{width:100%;border:none;border-radius:12px;padding:13px;font-size:16px;font-weight:800;color:#fff;background:#4f7cff;cursor:pointer}
.secondary{background:#6b7280;margin-top:10px}
.debug{display:none;white-space:pre-wrap;font-size:12px;background:#f3f4f6;border-radius:10px;padding:10px;overflow:auto}
</style>
</head>

<body>

<div class="container">

<a href="index.html" class="homeBtn">← 回首頁</a>

<h2>掛機效率分析器</h2>

<div class="card upload" id="uploadArea">
📷 上傳 / 貼上截圖 AI 分析
<input type="file" id="upload" accept="image/*" hidden>
<img id="preview">
</div>

<div class="card">
<div class="progress">
<div class="bar" id="bar"></div>
</div>
<div class="progress-text" id="progressText">等待圖片...</div>
</div>

<div class="card">
<div class="grid">
<div class="box"><div class="title">等級</div><div class="value" id="levelUI">-</div></div>
<div class="box"><div class="title">升等時間</div><div class="value" id="needTimeUI">-</div></div>
<div class="box"><div class="title">起始 EXP</div><div class="value" id="startExpUI">-</div></div>
<div class="box"><div class="title">目前 EXP</div><div class="value" id="endExpUI">-</div></div>
<div class="box"><div class="title">獲得 EXP</div><div class="value" id="gainExpUI">-</div></div>
<div class="box"><div class="title">剩餘 EXP</div><div class="value" id="remainUI">-</div></div>
</div>
</div>

<div class="card">

<div class="main" id="perHourUI">-</div>

<div class="grid">
<div class="box"><div class="title">EXP 每分鐘</div><div class="value" id="expPerMinUI">-</div></div>
<div class="box"><div class="title">EXP 每小時</div><div class="value" id="expPerHourBoxUI">-</div></div>
<div class="box"><div class="title">EXP 每天 24H</div><div class="value" id="perDayUI">-</div></div>
<div class="box"><div class="title">上線時間</div><div class="value" id="playtimeUI">-</div></div>
<div class="box"><div class="title">怪物每分鐘</div><div class="value" id="monsterMinUI">-</div></div>
<div class="box"><div class="title">怪物每小時</div><div class="value" id="monsterHourUI">-</div></div>
</div>

</div>

<div class="card">
<button onclick="copyResult()">一鍵複製結果</button>
<button class="secondary" onclick="toggleDebug()">查看 AI 回傳資料</button>
</div>

<div class="card debug" id="debugBox"></div>

</div>

<script>
let lastShare = "";

const upload = document.getElementById("upload");
const uploadArea = document.getElementById("uploadArea");
const preview = document.getElementById("preview");
const bar = document.getElementById("bar");
const progressText = document.getElementById("progressText");
const debugBox = document.getElementById("debugBox");

const levelUI = document.getElementById("levelUI");
const needTimeUI = document.getElementById("needTimeUI");
const startExpUI = document.getElementById("startExpUI");
const endExpUI = document.getElementById("endExpUI");
const gainExpUI = document.getElementById("gainExpUI");
const remainUI = document.getElementById("remainUI");
const perHourUI = document.getElementById("perHourUI");
const expPerMinUI = document.getElementById("expPerMinUI");
const expPerHourBoxUI = document.getElementById("expPerHourBoxUI");
const perDayUI = document.getElementById("perDayUI");
const playtimeUI = document.getElementById("playtimeUI");
const monsterMinUI = document.getElementById("monsterMinUI");
const monsterHourUI = document.getElementById("monsterHourUI");

uploadArea.addEventListener("click", () => upload.click());

upload.addEventListener("change", async e => {
  const file = e.target.files[0];
  if (file) run(file);
});

document.addEventListener("paste", e => {
  if (!e.clipboardData) return;

  for (const item of e.clipboardData.items) {
    if (item.type.includes("image")) {
      run(item.getAsFile());
      break;
    }
  }
});

async function run(file) {
  preview.src = URL.createObjectURL(file);
  preview.style.display = "block";

  resetUI();
  setStatus("AI 分析中...", 30);

  try {
    const image = await fileToBase64(file);

    const response = await fetch("/api/analyze", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ image })
    });

    const rawText = await response.text();
    let data;

    try {
      data = JSON.parse(rawText);
    } catch (e) {
      data = { error: "後端回傳不是 JSON", raw: rawText };
    }

    debugBox.innerText = JSON.stringify(data, null, 2);

    if (!response.ok || data.error) {
      setStatus("AI 分析失敗，請查看 AI 回傳資料", 100);
      return;
    }

    render(data);
    setStatus("AI 分析完成", 100);

  } catch (err) {
    console.error(err);
    debugBox.innerText = String(err);
    setStatus("AI 分析失敗，請查看 AI 回傳資料", 100);
  }
}

function fileToBase64(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => resolve(reader.result);
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

function render(data) {
  const level = num(data.level);
  const start = num(data.startExp);
  const end = num(data.endExp);
  const hours = parseTimeToHours(data.playTime);
  const monster = num(data.monsterValue);

  if (!isFinite(level) || !isFinite(start) || !isFinite(end)) {
    setStatus("AI 資料不完整，請查看 AI 回傳資料", 100);
    return;
  }

  const gain = end - start;
  const remain = Math.max(0, 100 - end);

  let perHour = NaN;
  let perMin = NaN;
  let perDay = NaN;
  let needHours = NaN;

  if (hours > 0 && gain > 0) {
    perHour = gain / hours;
    perMin = perHour / 60;
    perDay = perHour * 24;
    needHours = remain / perHour;
  }

  const d = isFinite(needHours) ? Math.floor(needHours / 24) : 0;
  const h = isFinite(needHours) ? Math.floor(needHours % 24) : 0;

  let monsterPerMinute = "-";
  let monsterPerHour = "-";

  if (isFinite(monster) && monster > 0) {
    if (data.monsterMode === "minute") {
      monsterPerMinute = fmt(monster, 1);
      monsterPerHour = fmt(monster * 60, 0);
    } else if (data.monsterMode === "hour") {
      monsterPerMinute = fmt(monster / 60, 1);
      monsterPerHour = fmt(monster, 0);
    } else if (data.monsterMode === "total" && hours > 0) {
      const perHourMonster = monster / hours;
      monsterPerMinute = fmt(perHourMonster / 60, 1);
      monsterPerHour = fmt(perHourMonster, 0);
    }
  }

  levelUI.innerText = `Lv.${level} → Lv.${level + 1}`;
  needTimeUI.innerText = isFinite(needHours) ? `${d}天 ${h}小時` : "-";
  startExpUI.innerText = `${fmt(start, 3)}%`;
  endExpUI.innerText = `${fmt(end, 3)}%`;
  gainExpUI.innerText = `${fmt(gain, 3)}%`;
  remainUI.innerText = `${fmt(remain, 3)}%`;

  perHourUI.innerText = isFinite(perHour) ? `${fmt(perHour, 3)}% / 小時` : "-";
  expPerMinUI.innerText = isFinite(perMin) ? `${fmt(perMin, 4)}%` : "-";
  expPerHourBoxUI.innerText = isFinite(perHour) ? `${fmt(perHour, 3)}%` : "-";
  perDayUI.innerText = isFinite(perDay) ? `${fmt(perDay, 3)}%` : "-";
  playtimeUI.innerText = data.playTime || "-";

  monsterMinUI.innerText = monsterPerMinute === "-" ? "-" : `${monsterPerMinute} 隻`;
  monsterHourUI.innerText = monsterPerHour === "-" ? "-" : `${monsterPerHour} 隻`;

  bar.style.width = `${Math.min(Math.max(end, 0), 100)}%`;
  progressText.innerText = `目前 ${fmt(end, 3)}% / 100% ｜ 還差 ${fmt(remain, 3)}%`;

  lastShare =
`掛機效率分析 ${levelUI.innerText}
目前 EXP：${fmt(end, 3)}%
獲得 EXP：${fmt(gain, 3)}%
EXP效率：約 ${isFinite(perHour) ? fmt(perHour, 3) : "-"}% / 小時
預估升等：${isFinite(needHours) ? `${d}天 ${h}小時` : "-"}
上線時間：${data.playTime || "-"}`;
}

function parseTimeToHours(str) {
  if (!str) return 0;

  const text = String(str);
  const m = text.match(/(\d+):(\d+):(\d+)/);

  if (m) {
    return Number(m[1]) + Number(m[2]) / 60 + Number(m[3]) / 3600;
  }

  const h = text.match(/(\d+(?:\.\d+)?)\s*(小時|hr|hour)/i);
  const min = text.match(/(\d+(?:\.\d+)?)\s*(分鐘|分|min|minute)/i);
  const sec = text.match(/(\d+(?:\.\d+)?)\s*(秒|sec|second)/i);

  let total = 0;
  if (h) total += Number(h[1]);
  if (min) total += Number(min[1]) / 60;
  if (sec) total += Number(sec[1]) / 3600;

  return total;
}

function num(v) {
  if (v === null || v === undefined || v === "") return NaN;
  return Number(String(v).replace("%", "").trim());
}

function fmt(n, d = 3) {
  if (!isFinite(n)) return "-";

  return Number(n)
    .toFixed(d)
    .replace(/\.?0+$/, "");
}

function setStatus(text, progress) {
  progressText.innerText = text;
  bar.style.width = `${progress}%`;
}

function resetUI() {
  lastShare = "";
  levelUI.innerText = "-";
  needTimeUI.innerText = "-";
  startExpUI.innerText = "-";
  endExpUI.innerText = "-";
  gainExpUI.innerText = "-";
  remainUI.innerText = "-";
  perHourUI.innerText = "-";
  expPerMinUI.innerText = "-";
  expPerHourBoxUI.innerText = "-";
  perDayUI.innerText = "-";
  playtimeUI.innerText = "-";
  monsterMinUI.innerText = "-";
  monsterHourUI.innerText = "-";
}

function copyResult() {
  if (!lastShare) {
    alert("尚未有結果");
    return;
  }

  navigator.clipboard.writeText(lastShare);
  alert("已複製結果");
}

function toggleDebug() {
  debugBox.style.display = debugBox.style.display === "block" ? "none" : "block";
}
</script>

</body>
</html>
