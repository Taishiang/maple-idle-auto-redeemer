<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>掛機效率分析器</title>

<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>

<style>
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,"Noto Sans TC",sans-serif;
  background:#f5f7fb;
  color:#111827;
}
.container{
  max-width:500px;
  margin:auto;
  padding:16px;
}
.homeBtn{
  display:inline-block;
  margin-bottom:14px;
  padding:10px 14px;
  background:#4f7cff;
  color:#fff;
  text-decoration:none;
  border-radius:10px;
  font-weight:800;
}
h2{
  text-align:center;
  margin:8px 0 18px;
}
.card{
  background:#fff;
  border-radius:14px;
  padding:16px;
  margin-bottom:14px;
  box-shadow:0 4px 14px rgba(0,0,0,.06);
}
.upload{
  text-align:center;
  padding:18px;
  border:2px dashed #d1d5db;
  border-radius:12px;
  cursor:pointer;
  color:#374151;
  font-weight:800;
}
#preview{
  display:none;
  width:100%;
  margin-top:12px;
  border-radius:10px;
}
.progress{
  height:10px;
  background:#e5e7eb;
  border-radius:999px;
  overflow:hidden;
}
.bar{
  height:100%;
  width:0%;
  background:linear-gradient(90deg,#4f7cff,#34c759);
  transition:.3s;
}
.progressText{
  text-align:right;
  font-size:12px;
  color:#666;
  margin-top:6px;
  line-height:1.5;
}
.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}
.box{
  background:#f9fafb;
  border-radius:10px;
  padding:10px;
  text-align:center;
}
.title{
  font-size:12px;
  color:#666;
}
.value{
  font-size:16px;
  font-weight:900;
  word-break:break-word;
}
.main{
  text-align:center;
  font-size:26px;
  font-weight:900;
  color:#4f7cff;
  margin:8px 0 14px;
}
button{
  width:100%;
  border:none;
  border-radius:12px;
  padding:13px;
  font-size:16px;
  font-weight:900;
  color:white;
  background:#4f7cff;
  margin-top:10px;
}
.secondary{
  background:#6b7280;
}
.warn{
  color:#d97706;
  font-size:12px;
  line-height:1.6;
  margin-top:10px;
  white-space:pre-wrap;
}
.debug{
  display:none;
  white-space:pre-wrap;
  font-size:12px;
  line-height:1.5;
  color:#6b7280;
  background:#f3f4f6;
  border-radius:10px;
  padding:10px;
}
@media(max-width:480px){
  .container{padding:14px}
  .main{font-size:22px}
}
</style>
</head>

<body>

<div class="container">

<a href="index.html" class="homeBtn">← 回首頁</a>

<h2>掛機效率分析器</h2>

<div class="card upload" onclick="upload.click()">
  📷 上傳 / 貼上截圖自動分析
  <input type="file" id="upload" accept="image/*" hidden>
  <img id="preview">
</div>

<div class="card">
  <div class="progress">
    <div class="bar" id="bar"></div>
  </div>
  <div class="progressText" id="progressText">等待圖片...</div>
</div>

<div class="card">
  <div class="grid">
    <div class="box">
      <div class="title">等級</div>
      <div class="value" id="levelUI">-</div>
    </div>
    <div class="box">
      <div class="title">升等時間</div>
      <div class="value" id="needTimeUI">-</div>
    </div>
    <div class="box">
      <div class="title">起始 EXP</div>
      <div class="value" id="startExpUI">-</div>
    </div>
    <div class="box">
      <div class="title">目前 EXP</div>
      <div class="value" id="endExpUI">-</div>
    </div>
    <div class="box">
      <div class="title">獲得 EXP</div>
      <div class="value" id="gainExpUI">-</div>
    </div>
    <div class="box">
      <div class="title">剩餘 EXP</div>
      <div class="value" id="remainUI">-</div>
    </div>
  </div>
</div>

<div class="card">
  <div class="main" id="perHourUI">-</div>

  <div class="grid">
    <div class="box">
      <div class="title">EXP 每分鐘</div>
      <div class="value" id="expPerMinUI">-</div>
    </div>
    <div class="box">
      <div class="title">EXP 每小時</div>
      <div class="value" id="expPerHourBoxUI">-</div>
    </div>
    <div class="box">
      <div class="title">EXP 每天 24H</div>
      <div class="value" id="perDayUI">-</div>
    </div>
    <div class="box">
      <div class="title">上線時間</div>
      <div class="value" id="playtimeUI">-</div>
    </div>
    <div class="box">
      <div class="title">怪物每分鐘</div>
      <div class="value" id="monsterMinUI">-</div>
    </div>
    <div class="box">
      <div class="title">怪物每小時</div>
      <div class="value" id="monsterHourUI">-</div>
    </div>
  </div>

  <div class="warn" id="warnUI"></div>
</div>

<div class="card">
  <button onclick="copyResult()">一鍵複製結果</button>
  <button class="secondary" onclick="toggleDebug()">查看辨識文字</button>
</div>

<div class="card debug" id="debugBox"></div>

</div>

<script>
let lastShare="";

upload.addEventListener("change",e=>{
  const file=e.target.files[0];
  if(file) run(file);
});

document.addEventListener("paste",e=>{
  if(!e.clipboardData)return;
  for(const item of e.clipboardData.items){
    if(item.type.includes("image")){
      run(item.getAsFile());
      break;
    }
  }
});

async function run(file){
  resetUI();

  preview.src=URL.createObjectURL(file);
  preview.style.display="block";

  setStatus("準備圖片中...",3);

  try{
    const img=await loadImage(file);
    const zones=makeZones(img);
    const texts={};
    let debug="";

    for(let i=0;i<zones.length;i++){
      const z=zones[i];

      setStatus(`辨識 ${z.name}...`,5+Math.round((i/zones.length)*85));

      const options={
        logger:m=>{
          if(m.status==="recognizing text"){
            const p=5+Math.round(((i+m.progress)/zones.length)*85);
            setStatus(`辨識 ${z.name}：${Math.round(m.progress*100)}%`,p);
          }
        }
      };

      if(z.whitelist){
        options.tessedit_char_whitelist=z.whitelist;
      }

      const res=await Tesseract.recognize(z.canvas,z.lang||"eng",options);

      texts[z.key]=res.data.text||"";
      debug+=`\n\n[${z.name}]\n${res.data.text||""}`;
    }

    debugBox.innerText=debug.trim();

    const data=parseData(texts);

    if(!data.ok){
      renderFail(data);
      setStatus(data.reason,100);
      return;
    }

    render(data);
    setStatus("分析完成",100);

  }catch(err){
    console.error(err);
    debugBox.innerText=String(err&&err.stack?err.stack:err);
    setStatus("分析失敗",100);
  }
}

function makeZones(img){
  const list=[];

  function add(key,name,x,y,w,h,scale,extra={}){
    list.push({
      key,
      name,
      canvas:crop(img,x,y,w,h,scale,extra.mode||"threshold"),
      ...extra
    });
  }

  add("rightExpMain","右側EXP主區",0.800,0.310,0.200,0.115,20,{
    whitelist:"0123456789.,:%LvV() "
  });

  add("rightExpWide","右側EXP寬區",0.750,0.285,0.250,0.150,16,{
    whitelist:"0123456789.,:%LvV() "
  });

  add("rightExpFullLine","右側EXP整行",0.610,0.300,0.390,0.145,14,{
    whitelist:"0123456789.,:%LvV() >"
  });

  add("rightStartOnly","右側起始EXP",0.790,0.350,0.105,0.070,24,{
    whitelist:"0123456789.,:%()"
  });

  add("rightEndOnly","右側目前EXP",0.900,0.350,0.100,0.070,24,{
    whitelist:"0123456789.,:%()"
  });

  add("bottomExp","底部目前EXP驗證",0.000,0.925,0.300,0.065,18,{
    whitelist:"0123456789.,:%EXP "
  });

  add("playtime","PLAYTIME",0.585,0.330,0.200,0.090,16,{
    whitelist:"0123456789:"
  });

  add("monster","怪物數量",0.870,0.240,0.120,0.080,16,{
    whitelist:"0123456789.,"
  });

  add("levelRight","右側等級",0.810,0.320,0.190,0.090,18,{
    whitelist:"0123456789LvV."
  });

  add("levelBottom","底部等級",0.410,0.760,0.120,0.080,18,{
    whitelist:"0123456789LvV."
  });

  return list;
}

function crop(img,x,y,w,h,scale,mode){
  const canvas=document.createElement("canvas");

  const sx=img.width*x;
  const sy=img.height*y;
  const sw=img.width*w;
  const sh=img.height*h;

  canvas.width=Math.max(1,Math.round(sw*scale));
  canvas.height=Math.max(1,Math.round(sh*scale));

  const ctx=canvas.getContext("2d",{willReadFrequently:true});

  ctx.drawImage(
    img,
    sx,sy,sw,sh,
    0,0,canvas.width,canvas.height
  );

  if(mode==="normal")return canvas;

  const imageData=ctx.getImageData(0,0,canvas.width,canvas.height);
  const d=imageData.data;

  for(let i=0;i<d.length;i+=4){
    const gray=d[i]*0.299+d[i+1]*0.587+d[i+2]*0.114;
    const v=gray>125?255:0;
    d[i]=d[i+1]=d[i+2]=v;
  }

  ctx.putImageData(imageData,0,0);

  return canvas;
}

function parseData(texts){
  const rightText=cleanText([
    texts.rightExpMain,
    texts.rightExpWide,
    texts.rightExpFullLine,
    texts.rightStartOnly,
    texts.rightEndOnly
  ].join(" "));

  const bottomText=cleanText(texts.bottomExp||"");
  const playText=cleanText(texts.playtime||"");
  const monsterText=cleanText(texts.monster||"");

  const rightPercents=getPercents(rightText);
  const startOnlyPercents=getPercents(texts.rightStartOnly||"");
  const endOnlyPercents=getPercents(texts.rightEndOnly||"");
  const bottomPercents=getPercents(bottomText);

  let start=NaN;
  let end=NaN;

  if(rightPercents.length>=2){
    const pair=chooseBattlePair(rightPercents);
    start=pair.start;
    end=pair.end;
  }

  if(!isFinite(start)||!isFinite(end)){
    if(startOnlyPercents.length && endOnlyPercents.length){
      start=startOnlyPercents[startOnlyPercents.length-1];
      end=endOnlyPercents[endOnlyPercents.length-1];
    }
  }

  if(!isFinite(start)||!isFinite(end)){
    const bottomCurrent=bottomPercents.length ? bottomPercents[bottomPercents.length-1] : NaN;

    if(rightPercents.length>=1 && isFinite(bottomCurrent)){
      const candidate=rightPercents.find(x=>x < bottomCurrent && bottomCurrent-x < 20);
      if(isFinite(candidate)){
        start=candidate;
        end=bottomCurrent;
      }
    }
  }

  if(bottomPercents.length && isFinite(end)){
    const bottomCurrent=bottomPercents[bottomPercents.length-1];
    if(Math.abs(bottomCurrent-end)<1){
      end=bottomCurrent;
    }
  }

  if(isFinite(start)&&isFinite(end)&&end<start){
    if(start-end>50){
      end+=100;
    }else{
      const tmp=start;
      start=end;
      end=tmp;
    }
  }

  const level=chooseBestLevel([
    texts.levelRight,
    texts.levelBottom,
    rightText
  ]);

  const time=parseTime(playText);
  const monsterNumber=firstNumber(monsterText);
  const monster=normalizeMonster(monsterNumber,time.hours);

  const data={
    level,
    start,
    end,
    hours:time.hours,
    playtimeText:time.text,
    monsterNumber,
    monsterPerMinute:monster.perMinute,
    monsterPerHour:monster.perHour,
    rightPercents,
    startOnlyPercents,
    endOnlyPercents,
    bottomPercents
  };

  if(!level){
    return{
      ok:false,
      reason:"找不到等級 Lv.xxx",
      ...data
    };
  }

  if(!isFinite(start)||!isFinite(end)){
    return{
      ok:false,
      reason:"找不到右側起始與目前 EXP",
      ...data
    };
  }

  if(!isFinite(time.hours)||time.hours<=0){
    return{
      ok:false,
      reason:"找不到 PLAYTIME",
      ...data
    };
  }

  if(end-start<=0){
    return{
      ok:false,
      reason:"EXP 沒有增加或辨識錯誤",
      ...data
    };
  }

  return{
    ok:true,
    ...data
  };
}

function chooseBattlePair(arr){
  const clean=(arr||[])
    .filter(n=>isFinite(n)&&n>=0&&n<=100)
    .map(n=>Number(n.toFixed(3)));

  if(clean.length<2){
    return{start:NaN,end:NaN};
  }

  let best=null;

  for(let i=0;i<clean.length-1;i++){
    const a=clean[i];
    const b=clean[i+1];
    const diff=b-a;

    if(diff>0 && diff<20){
      if(!best || diff<best.diff){
        best={start:a,end:b,diff};
      }
    }
  }

  if(best)return best;

  for(let i=0;i<clean.length;i++){
    for(let j=i+1;j<clean.length;j++){
      const a=clean[i];
      const b=clean[j];
      const diff=b-a;
      if(diff>0 && diff<20){
        return{start:a,end:b};
      }
    }
  }

  return{start:NaN,end:NaN};
}

function render(data){
  const gain=data.end-data.start;
  const realEnd=data.end%100;

  const perHour=gain/data.hours;
  const perMin=perHour/60;
  const perDay=perHour*24;

  const remain=100-realEnd;
  const needHours=remain/perHour;

  const d=Math.floor(needHours/24);
  const h=Math.floor(needHours%24);
  const m=Math.floor((needHours*60)%60);

  levelUI.innerText=`Lv.${data.level} → Lv.${data.level+1}`;
  needTimeUI.innerText=`${d}天 ${h}小時 ${m}分`;
  startExpUI.innerText=fmt(data.start%100,3)+"%";
  endExpUI.innerText=fmt(realEnd,3)+"%";
  gainExpUI.innerText=fmt(gain,3)+"%";
  remainUI.innerText=fmt(remain,3)+"%";

  perHourUI.innerText=fmt(perHour,3)+"% / 小時";
  expPerMinUI.innerText=fmt(perMin,4)+"%";
  expPerHourBoxUI.innerText=fmt(perHour,3)+"%";
  perDayUI.innerText=fmt(perDay,3)+"%";
  playtimeUI.innerText=data.playtimeText;

  monsterMinUI.innerText=
    isFinite(data.monsterPerMinute)
    ? fmt(data.monsterPerMinute,1)+" 隻"
    : "-";

  monsterHourUI.innerText=
    isFinite(data.monsterPerHour)
    ? fmt(data.monsterPerHour,0)+" 隻"
    : "-";

  bar.style.width=Math.min(realEnd,100)+"%";

  progressText.innerText=
    `目前 ${fmt(realEnd,3)}% / 100% ｜ 還差 ${fmt(remain,3)}%`;

  warnUI.innerText=
    "辨識來源：右側戰鬥視窗為主，底部 EXP 只驗證目前值。\n"+
    "右側EXP："+safeJoin(data.rightPercents)+"\n"+
    "左側分區："+safeJoin(data.startOnlyPercents)+"\n"+
    "右側分區："+safeJoin(data.endOnlyPercents)+"\n"+
    "底部目前："+safeJoin(data.bottomPercents);

  lastShare=
`掛機效率分析
Lv.${data.level} → Lv.${data.level+1}
起始 EXP：${fmt(data.start%100,3)}%
目前 EXP：${fmt(realEnd,3)}%
獲得 EXP：${fmt(gain,3)}%
EXP效率：約 ${fmt(perHour,3)}% / 小時
EXP每分鐘：約 ${fmt(perMin,4)}%
EXP每天24H：約 ${fmt(perDay,3)}%
預估升等：${d}天 ${h}小時 ${m}分
上線時間：${data.playtimeText}
怪物：約 ${fmt(data.monsterPerMinute,1)} 隻/分鐘，${fmt(data.monsterPerHour,0)} 隻/小時`;
}

function renderFail(data){
  if(data.level){
    levelUI.innerText=`Lv.${data.level}`;
  }

  if(isFinite(data.start)){
    startExpUI.innerText=fmt(data.start,3)+"%";
  }

  if(isFinite(data.end)){
    endExpUI.innerText=fmt(data.end%100,3)+"%";
    bar.style.width=Math.min(data.end%100,100)+"%";
  }

  if(data.playtimeText){
    playtimeUI.innerText=data.playtimeText;
  }

  warnUI.innerText=
    data.reason+"\n\n"+
    "右側EXP："+safeJoin(data.rightPercents)+"\n"+
    "左側分區："+safeJoin(data.startOnlyPercents)+"\n"+
    "右側分區："+safeJoin(data.endOnlyPercents)+"\n"+
    "底部目前："+safeJoin(data.bottomPercents)+"\n\n"+
    "請點「查看辨識文字」看 OCR 實際讀到什麼。";
}

function getPercents(t){
  let s=String(t||"")
    .replace(/[％]/g,"%")
    .replace(/[，,]/g,".")
    .replace(/[Oo]/g,"0")
    .replace(/[Il|]/g,"1")
    .replace(/\s+/g," ");

  const arr=[];

  const patterns=[
    /\d{1,3}(?:[\.\s]\d{1,6})?\s*%/g,
    /\d{1,3}[\.\s]\d{2,6}/g,
    /\b\d{4,6}\b/g
  ];

  for(const p of patterns){
    const matches=s.match(p)||[];
    for(const x of matches){
      const n=normalizePercentValue(x);
      if(isFinite(n)&&n>=0&&n<=100){
        arr.push(Number(n.toFixed(3)));
      }
    }
  }

  const final=[];

  for(const n of arr){
    const last=final[final.length-1];
    if(last===undefined || Math.abs(last-n)>0.001){
      final.push(n);
    }
  }

  return final;
}

function normalizePercentValue(v){
  let raw=String(v)
    .replace("%","")
    .replace(/[，,]/g,".")
    .replace(/[^\d.\s]/g,"")
    .trim();

  if(!raw)return NaN;

  if(raw.includes(" ") && !raw.includes(".")){
    raw=raw.replace(/\s+/g,".");
  }else{
    raw=raw.replace(/\s+/g,"");
  }

  const parts=raw.split(".").filter(Boolean);

  if(parts.length>2){
    raw=parts[0]+"."+parts.slice(1).join("");
  }

  let n=parseFloat(raw);

  if(!isFinite(n))return NaN;

  if(n>1000)n=n/1000;
  if(n>100)n=n/10;
  if(n>100)return NaN;

  return Number(n.toFixed(3));
}

function parseTime(t){
  const m=String(t||"").match(/(\d{1,3})[:：](\d{2})[:：](\d{2})/);

  if(!m){
    return{
      hours:NaN,
      text:""
    };
  }

  const h=Number(m[1]);
  const mi=Number(m[2]);
  const s=Number(m[3]);

  return{
    hours:h+mi/60+s/3600,
    text:
      `${String(h).padStart(2,"0")}:`+
      `${String(mi).padStart(2,"0")}:`+
      `${String(s).padStart(2,"0")}`
  };
}

function chooseBestLevel(texts){
  let all=[];

  for(const t of texts){
    const s=String(t||"")
      .replace(/[Oo]/g,"0")
      .replace(/[Il|]/g,"1");

    const lv=s.match(/L\s*v?\s*\.?\s*(\d{2,3})/gi)||[];

    for(const x of lv){
      const m=x.match(/\d{2,3}/);
      if(m)all.push(Number(m[0]));
    }

    const nums=s.match(/\d{2,3}/g)||[];

    for(const x of nums){
      all.push(Number(x));
    }
  }

  all=all.filter(n=>isFinite(n)&&n>=10&&n<=250);

  if(!all.length)return null;

  const counts={};

  all.forEach(n=>{
    counts[n]=(counts[n]||0)+1;
  });

  return Object.keys(counts)
    .map(Number)
    .sort((a,b)=>counts[b]-counts[a]||a-b)[0];
}

function firstNumber(t){
  const s=String(t||"").replace(/[Oo]/g,"0");

  const decimal=s.match(/\d{1,7}[\.,]\d+/);

  if(decimal){
    return Number(decimal[0].replace(",","."));
  }

  const normal=s.match(/\d{1,7}/);

  if(!normal)return NaN;

  return Number(normal[0]);
}

function normalizeMonster(value,hours){
  let perMinute=NaN;
  let perHour=NaN;

  if(!isFinite(value)||value<=0){
    return{
      perMinute,
      perHour
    };
  }

  if(value>=1000 && isFinite(hours)&&hours>0){
    perHour=value/hours;
    perMinute=perHour/60;
  }else{
    perMinute=value;
    perHour=value*60;
  }

  return{
    perMinute,
    perHour
  };
}

function cleanText(t){
  return String(t||"")
    .replace(/[，]/g,".")
    .replace(/[％]/g,"%")
    .replace(/[Oo]/g,"0")
    .replace(/[Il|]/g,"1")
    .replace(/[（]/g,"(")
    .replace(/[）]/g,")")
    .replace(/\s+/g," ")
    .trim();
}

function safeJoin(arr){
  return arr&&arr.length ? arr.join(", ") : "無";
}

function fmt(n,d=3){
  if(!isFinite(n))return"-";
  return Number(n)
    .toFixed(d)
    .replace(/\.?0+$/,"");
}

function loadImage(file){
  return new Promise((resolve,reject)=>{
    const img=new Image();
    img.onload=()=>resolve(img);
    img.onerror=reject;
    img.src=URL.createObjectURL(file);
  });
}

function setStatus(text,progress){
  progressText.innerText=text;
  bar.style.width=Math.max(0,Math.min(progress,100))+"%";
}

function resetUI(){
  lastShare="";
  warnUI.innerText="";
  debugBox.innerText="";

  [
    levelUI,
    needTimeUI,
    startExpUI,
    endExpUI,
    gainExpUI,
    remainUI,
    perHourUI,
    expPerMinUI,
    expPerHourBoxUI,
    perDayUI,
    playtimeUI,
    monsterMinUI,
    monsterHourUI
  ].forEach(el=>{
    el.innerText="-";
  });

  bar.style.width="0%";
  progressText.innerText="準備分析...";
}

function copyResult(){
  if(!lastShare){
    alert("尚未有完整計算結果");
    return;
  }

  navigator.clipboard.writeText(lastShare);
  alert("已複製結果");
}

function toggleDebug(){
  debugBox.style.display=
    debugBox.style.display==="block" ? "none" : "block";
}
</script>

</body>
