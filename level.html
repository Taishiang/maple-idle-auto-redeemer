<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>掛機效率分析器</title>

<style>
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,"Noto Sans TC",sans-serif;
  background:#f5f7fb;
  color:#111827;
}
.container{max-width:480px;margin:auto;padding:20px}
.homeBtn{display:inline-block;margin-bottom:14px;padding:10px 14px;background:#4f7cff;color:white;text-decoration:none;border-radius:10px;font-weight:700}
h2{text-align:center;margin:8px 0 18px}
.card{background:#fff;border-radius:14px;padding:16px;margin-bottom:14px;box-shadow:0 4px 14px rgba(0,0,0,.06)}
.upload{text-align:center;padding:18px;border:2px dashed #d1d5db;border-radius:12px;cursor:pointer;color:#374151;font-weight:700}
#preview{display:none;width:100%;margin-top:12px;border-radius:10px}
.progress{height:10px;background:#e5e7eb;border-radius:999px;overflow:hidden}
.bar{height:100%;width:0%;background:linear-gradient(90deg,#4f7cff,#34c759);transition:.4s ease}
.progress-text{font-size:12px;color:#666;text-align:right;margin-top:6px;line-height:1.5}
.main{font-size:28px;font-weight:800;color:#4f7cff;text-align:center;margin:10px 0}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.box{background:#f9fafb;padding:10px;border-radius:10px;text-align:center}
.title{font-size:12px;color:#666}
.value{font-size:16px;font-weight:700;word-break:break-word}
button{width:100%;border:none;border-radius:12px;padding:13px;font-size:16px;font-weight:800;color:white;background:#4f7cff;cursor:pointer}
.secondary{background:#6b7280;margin-top:10px}
.manual{display:none}
.manual label{display:block;margin-top:10px;font-size:12px;color:#666}
.manual input,.manual select{width:100%;box-sizing:border-box;margin-top:6px;padding:11px;border-radius:10px;border:1px solid #d1d5db;font-size:15px}
.debug{display:none;white-space:pre-wrap;font-size:12px;line-height:1.5;color:#6b7280;background:#f3f4f6;border-radius:10px;padding:10px}
.warn{color:#d97706;font-size:12px;line-height:1.5;margin-top:8px}
@media(max-width:480px){.container{padding:14px}.main{font-size:24px}}
</style>
</head>

<body>
<div class="container">

<a href="index.html" class="homeBtn">← 回首頁</a>

<h2>掛機效率分析器</h2>

<div class="card upload" onclick="upload.click()">
  📷 上傳 / 貼上截圖 AI 分析
  <input type="file" id="upload" accept="image/*" hidden>
  <img id="preview">
</div>

<div class="card">
  <div class="progress">
    <div class="bar" id="bar"></div>
  </div>
  <div class="progress-text" id="progressText">等待圖片...</div>
</div>

<div class="card">
  <div class="grid">
    <div class="box"><div class="title">等級</div><div class="value" id="levelUI">-</div></div>
    <div class="box"><div class="title">升等時間</div><div class="value" id="needTimeUI">-</div></div>
    <div class="box"><div class="title">起始 EXP</div><div class="value" id="startExpUI">-</div></div>
    <div class="box"><div class="title">目前 EXP</div><div class="value" id="endExpUI">-</div></div>
    <div class="box"><div class="title">獲得 EXP</div><div class="value" id="gainExpUI">-</div></div>
    <div class="box"><div class="title">剩餘 EXP</div><div class="value" id="remainUI">-</div></div>
  </div>
</div>

<div class="card">
  <div class="main" id="perHourUI">-</div>

  <div class="grid">
    <div class="box"><div class="title">EXP 每分鐘</div><div class="value" id="expPerMinUI">-</div></div>
    <div class="box"><div class="title">EXP 每小時</div><div class="value" id="expPerHourBoxUI">-</div></div>
    <div class="box"><div class="title">EXP 每天 24H</div><div class="value" id="perDayUI">-</div></div>
    <div class="box"><div class="title">上線時間</div><div class="value" id="playtimeUI">-</div></div>
    <div class="box"><div class="title">怪物每分鐘</div><div class="value" id="monsterMinUI">-</div></div>
    <div class="box"><div class="title">怪物每小時</div><div class="value" id="monsterHourUI">-</div></div>
  </div>

  <div class="warn" id="warnUI"></div>
</div>

<div class="card manual" id="manualBox">
  <b>手動修正</b>

  <label>目前等級</label>
  <input id="mLevel" placeholder="例如 106">

  <label>起始 EXP %</label>
  <input id="mStart" placeholder="例如 40.636">

  <label>目前 EXP %</label>
  <input id="mEnd" placeholder="例如 41.226">

  <label>上線時間</label>
  <input id="mTime" placeholder="例如 00:27:26">

  <label>怪物數值</label>
  <input id="mMonster" placeholder="例如 108.3 / 6391.4 / 11571">

  <label>怪物數值類型</label>
  <select id="mMonsterMode">
    <option value="auto">自動判斷</option>
    <option value="minute">每分鐘</option>
    <option value="hour">每小時</option>
    <option value="total">總怪物數</option>
  </select>

  <button onclick="runManual()">套用手動資料</button>
</div>

<div class="card">
  <button onclick="copyResult()">一鍵複製結果</button>
  <button class="secondary" onclick="toggleManual()">手動修正</button>
  <button class="secondary" onclick="toggleDebug()">查看 AI 回傳資料</button>
</div>

<div class="card debug" id="debugBox"></div>

</div>

<script>
let lastShare = "";

upload.addEventListener("change", e => {
  const file = e.target.files[0];
  if(file) run(file);
});

document.addEventListener("paste", e => {
  for(let item of e.clipboardData.items){
    if(item.type.includes("image")){
      run(item.getAsFile());
      break;
    }
  }
});

async function run(file){
  preview.src = URL.createObjectURL(file);
  preview.style.display = "block";

  setStatus("AI 分析圖片中...", 10);

  try{
    const image = await fileToBase64(file);

    const res = await fetch("/api/analyze", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ image })
    });

    const ai = await res.json();

    debugBox.innerText = JSON.stringify(ai, null, 2);

    if(!res.ok || ai.error){
      setStatus("AI 分析失敗，請用手動修正", 100);
      manualBox.style.display = "block";
      return;
    }

    const data = convertAIData(ai);

    if(!data.ok){
      setStatus(data.reason + "，請用手動修正", 100);
      fillManual(data);
      manualBox.style.display = "block";
      return;
    }

    render(data);
    setStatus("AI 分析完成", 100);

  }catch(err){
    console.error(err);
    debugBox.innerText = String(err);
    setStatus("AI 分析失敗，請用手動修正", 100);
    manualBox.style.display = "block";
  }
}

function fileToBase64(file){
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => resolve(reader.result);
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

function convertAIData(ai){
  const level = Number(ai.level);
  const start = Number(ai.startExp);
  const end = Number(ai.endExp);
  const hours = parseTimeToHours(ai.playTime);
  const monsterNumber = Number(ai.monsterValue);
  const mode = ai.monsterMode || "auto";

  const monster = normalizeMonster(monsterNumber, mode, hours, String(monsterNumber));

  const data = {
    level,
    start,
    end,
    hours,
    playtimeText: ai.playTime,
    monsterNumber,
    battleMode: mode,
    monsterPerMinute: monster.perMinute,
    monsterPerHour: monster.perHour,
    totalMonsters: monster.total
  };

  if(!level) return { ok:false, reason:"AI 找不到等級", ...data };
  if(!isFinite(start) || !isFinite(end)) return { ok:false, reason:"AI 找不到 EXP", ...data };
  if(!isFinite(hours) || hours <= 0) return { ok:false, reason:"AI 找不到上線時間", ...data };
  if(end - start <= 0) return { ok:false, reason:"EXP 沒有增加或辨識錯誤", ...data };

  return { ok:true, ...data };
}

function render(data){
  const gain = data.end - data.start;
  const perHour = gain / data.hours;
  const perMin = perHour / 60;
  const perDay = perHour * 24;
  const remain = 100 - data.end;
  const needHours = remain / perHour;

  const d = Math.floor(needHours / 24);
  const h = Math.floor(needHours % 24);

  levelUI.innerText = `Lv.${data.level} → Lv.${data.level + 1}`;
  needTimeUI.innerText = `${d}天 ${h}小時`;

  startExpUI.innerText = fmt(data.start, 3) + "%";
  endExpUI.innerText = fmt(data.end, 3) + "%";
  gainExpUI.innerText = fmt(gain, 3) + "%";
  remainUI.innerText = fmt(remain, 3) + "%";

  perHourUI.innerText = fmt(perHour, 3) + "% / 小時";
  expPerMinUI.innerText = fmt(perMin, 4) + "%";
  expPerHourBoxUI.innerText = fmt(perHour, 3) + "%";
  perDayUI.innerText = fmt(perDay, 3) + "%";
  playtimeUI.innerText = data.playtimeText || "-";

  monsterMinUI.innerText = isFinite(data.monsterPerMinute) ? fmt(data.monsterPerMinute, 1) + " 隻" : "-";
  monsterHourUI.innerText = isFinite(data.monsterPerHour) ? fmt(data.monsterPerHour, 0) + " 隻" : "-";

  bar.style.width = Math.min((data.end / 100) * 100, 100) + "%";

  const warnings = [];
  if(data.hours < 0.5){
    warnings.push("樣本低於 30 分鐘，建議掛滿 1 小時以上更準。");
  }

  warnUI.innerText = warnings.join(" ");

  progressText.innerText =
    `目前 ${fmt(data.end,3)}% / 100% ｜ 還差 ${fmt(remain,3)}%`;

  lastShare =
`掛機效率分析
Lv.${data.level} → Lv.${data.level + 1}
目前 EXP：${fmt(data.end,3)}%
EXP效率：約 ${fmt(perHour,3)}% / 小時
預估升等：${d}天 ${h}小時
上線時間：${data.playtimeText}
怪物：約 ${fmt(data.monsterPerMinute,1)} 隻/分鐘，${fmt(data.monsterPerHour,0)} 隻/小時`;
}

function runManual(){
  const level = num(mLevel.value);
  const start = num(mStart.value);
  const end = num(mEnd.value);
  const hours = parseTimeToHours(mTime.value);
  const monsterNumber = num(mMonster.value);
  const mode = mMonsterMode.value;

  if(!level || level <= 0 || level > 250){
    alert("請輸入正確等級");
    return;
  }

  if(!isFinite(start) || !isFinite(end)){
    alert("請輸入起始與目前 EXP");
    return;
  }

  if(!isFinite(hours) || hours <= 0){
    alert("請輸入上線時間");
    return;
  }

  const monster = normalizeMonster(monsterNumber, mode, hours, String(mMonster.value));

  render({
    ok:true,
    level,
    start,
    end,
    hours,
    playtimeText:mTime.value,
    monsterNumber,
    battleMode:mode,
    monsterPerMinute:monster.perMinute,
    monsterPerHour:monster.perHour,
    totalMonsters:monster.total
  });

  setStatus("手動資料已套用", 100);
}

function fillManual(data){
  if(!data) return;
  if(data.level) mLevel.value = data.level;
  if(isFinite(data.start)) mStart.value = data.start;
  if(isFinite(data.end)) mEnd.value = data.end;
  if(data.playtimeText) mTime.value = data.playtimeText;
  if(isFinite(data.monsterNumber)) mMonster.value = data.monsterNumber;
}

function normalizeMonster(value, mode, hours, rawText = ""){
  let total = NaN;
  let perMinute = NaN;
  let perHour = NaN;

  if(!isFinite(value) || value <= 0){
    return { total, perMinute, perHour };
  }

  let finalMode = mode;

  if(finalMode === "auto"){
    finalMode = detectBattleMode(rawText, value);
  }

  if(finalMode === "minute"){
    perMinute = value;
    perHour = value * 60;
    total = isFinite(hours) ? perHour * hours : NaN;
  }

  if(finalMode === "hour"){
    perHour = value;
    perMinute = value / 60;
    total = isFinite(hours) ? perHour * hours : NaN;
  }

  if(finalMode === "total"){
    total = value;
    perHour = isFinite(hours) && hours > 0 ? value / hours : NaN;
    perMinute = perHour / 60;
  }

  return { total, perMinute, perHour };
}

function detectBattleMode(rawText, value){
  const raw = String(rawText || "");
  const hasDecimal = /[\.,]/.test(raw);

  if(hasDecimal && isFinite(value) && value >= 1000) return "hour";
  if(hasDecimal && isFinite(value) && value < 1000) return "minute";
  if(isFinite(value) && value >= 1000) return "total";
  if(isFinite(value) && value > 0) return "minute";

  return "minute";
}

function parseTimeToHours(str){
  if(!str) return 0;

  const m = String(str).match(/(\d+):(\d+):(\d+)/);

  if(!m) return 0;

  return Number(m[1]) + Number(m[2]) / 60 + Number(m[3]) / 3600;
}

function num(v){
  return Number(
    String(v || "")
      .replace("%", "")
      .replace(",", ".")
      .replace(/[^\d.]/g, "")
  );
}

function fmt(n, d = 3){
  if(!isFinite(n)) return "-";
  return Number(n).toFixed(d).replace(/\.?0+$/, "");
}

function setStatus(text, progress){
  progressText.innerText = text;
  bar.style.width = Math.max(0, Math.min(progress, 100)) + "%";
}

function copyResult(){
  if(!lastShare){
    alert("尚未有結果");
    return;
  }

  navigator.clipboard.writeText(lastShare);
  alert("已複製結果");
}

function toggleManual(){
  manualBox.style.display = manualBox.style.display === "block" ? "none" : "block";
}

function toggleDebug(){
  debugBox.style.display = debugBox.style.display === "block" ? "none" : "block";
}
</script>

</body>
</html>
