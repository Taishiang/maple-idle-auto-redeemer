<!doctype html>
<html lang="zh-Hant">

<head>

<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Maple Idle 升級分析器</title>

<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>

<style>

body{
  margin:0;
  min-height:100vh;
  background:#0f172a;
  color:white;
  font-family:Arial,"Noto Sans TC",sans-serif;
  padding:18px;
}

.card{
  width:100%;
  max-width:760px;
  margin:auto;
  background:rgba(255,255,255,.06);
  border:1px solid rgba(255,255,255,.1);
  border-radius:28px;
  padding:30px;
  text-align:center;
  box-shadow:0 20px 80px rgba(0,0,0,.45);
}

h1{
  font-size:32px;
  margin:0;
}

.sub{
  color:#cbd5e1;
  line-height:1.8;
  margin:16px 0 24px;
}

.back{
  display:inline-block;
  margin-bottom:22px;
  color:white;
  text-decoration:none;
  background:#1e293b;
  padding:12px 18px;
  border-radius:14px;
  font-weight:800;
}

input,
select{
  width:100%;
  padding:15px;
  border-radius:16px;
  border:1px solid rgba(255,255,255,.12);
  background:rgba(255,255,255,.08);
  color:white;
  font-size:16px;
  box-sizing:border-box;
  margin-top:10px;
}

button{
  width:100%;
  margin-top:16px;
  border:0;
  border-radius:18px;
  padding:17px;
  font-size:19px;
  font-weight:900;
  color:white;
  background:linear-gradient(135deg,#06b6d4,#3b82f6);
  cursor:pointer;
}

.preview{
  display:none;
  width:100%;
  max-height:360px;
  object-fit:contain;
  margin-top:18px;
  border-radius:18px;
}

.status{
  margin-top:18px;
  color:#facc15;
  line-height:1.8;
}

.result{
  margin-top:22px;
  padding:24px;
  border-radius:24px;
  background:rgba(6,182,212,.14);
  border:1px solid rgba(103,232,249,.35);
}

.big{
  font-size:42px;
  font-weight:900;
  color:#67e8f9;
  margin-top:10px;
}

.detail{
  margin-top:14px;
  color:#dbeafe;
  line-height:1.9;
  font-size:15px;
}

.smallBtn{
  background:#334155;
  font-size:14px;
  padding:12px;
}

@media(max-width:560px){

  .card{
    padding:22px;
  }

  .big{
    font-size:34px;
  }

}

</style>

</head>

<body>

<div class="card">

<a class="back" href="index.html">
← 回首頁
</a>

<h1>
📊 Maple Idle 升級分析器
</h1>

<div class="sub">
上傳「自動狩獵概況」截圖，自動分析升級時間。
</div>

<input type="file" id="imageUpload" accept="image/*">

<img id="preview" class="preview">

<button onclick="fakeAnalyze()">
開始分析圖片
</button>

<div class="status" id="status">
請先上傳遊戲截圖
</div>

<div class="result">

<div>
🎯 預估升級
</div>

<div class="big" id="main">
尚未分析
</div>

<div class="detail" id="detail">
等待分析結果
</div>

</div>

<button class="smallBtn" onclick="toggleDebug()">
查看辨識文字
</button>

<div
id="debug"
style="
display:none;
margin-top:18px;
background:rgba(0,0,0,.25);
padding:14px;
border-radius:16px;
text-align:left;
white-space:pre-wrap;
font-size:13px;
color:#94a3b8;
"
>
OCR 文字會顯示在這裡
</div>

</div>

<script>

let uploadedFile = null;

document
.getElementById('imageUpload')
.addEventListener('change',e=>{

  uploadedFile = e.target.files[0];

  if(!uploadedFile)return;

  const img =
    document.getElementById('preview');

  img.src =
    URL.createObjectURL(uploadedFile);

  img.style.display='block';

  document.getElementById('status').innerText =
    '圖片已上傳，請按「開始分析圖片」';

});

function toggleDebug(){

  const box =
    document.getElementById('debug');

  box.style.display =
    box.style.display === 'block'
      ? 'none'
      : 'block';

}

function fakeAnalyze(){

  document.getElementById('status').innerText =
    '分析完成';

  document.getElementById('main').innerText =
    '約 13 天 4 小時';

  document.getElementById('detail').innerHTML =
    `
    等級：<b>106 → 107</b><br>
    目前 EXP：<b>34.714%</b><br>
    每小時：約 <b>0.198%</b><br>
    每日：約 <b>4.75%</b><br>
    每分鐘：約 <b>105</b> 隻<br>
    每小時：約 <b>6330</b> 隻
    `;

  document.getElementById('debug').innerText =
`Lv.106
34.645%
34.714%
00:20:52
2200`;

}

</script>

</body>

</html>
