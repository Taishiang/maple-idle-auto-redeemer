<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Maple Idle 升級時間分析器</title>
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
<style>
body{
  margin:0;
  min-height:100vh;
  background:#0f172a;
  color:white;
  font-family:Arial,"Noto Sans TC",sans-serif;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:18px;
}
.card{
  width:100%;
  max-width:720px;
  background:rgba(255,255,255,.06);
  border:1px solid rgba(255,255,255,.1);
  border-radius:28px;
  padding:34px;
  text-align:center;
  box-shadow:0 20px 80px rgba(0,0,0,.45);
}
h1{
  font-size:34px;
  margin:0;
}
.sub{
  color:#cbd5e1;
  line-height:1.8;
  margin:18px 0 28px;
}
input{
  width:100%;
  padding:18px;
  border-radius:18px;
  border:1px solid rgba(255,255,255,.12);
  background:rgba(255,255,255,.08);
  color:white;
  font-size:16px;
  box-sizing:border-box;
}
button{
  width:100%;
  margin-top:18px;
  border:0;
  border-radius:18px;
  padding:18px;
  font-size:20px;
  font-weight:900;
  color:white;
  background:linear-gradient(135deg,#06b6d4,#3b82f6);
  cursor:pointer;
}
.preview{
  display:none;
  width:100%;
  max-height:360px;
  object-fit:contain;
  margin-top:20px;
  border-radius:18px;
}
.status{
  margin-top:20px;
  color:#facc15;
  line-height:1.8;
}
.result{
  margin-top:26px;
  padding:24px;
  border-radius:24px;
  background:rgba(6,182,212,.14);
  border:1px solid rgba(103,232,249,.35);
}
.big{
  font-size:42px;
  font-weight:900;
  color:#67e8f9;
  margin-top:10px;
}
.detail{
  margin-top:14px;
  color:#dbeafe;
  line-height:1.8;
  font-size:15px;
}
.back{
  display:inline-block;
  margin-bottom:22px;
  color:white;
  text-decoration:none;
  background:#1e293b;
  padding:12px 18px;
  border-radius:14px;
  font-weight:800;
}
.debug{
  margin-top:18px;
  text-align:left;
  background:rgba(0,0,0,.25);
  border-radius:16px;
  padding:14px;
  color:#94a3b8;
  font-size:13px;
  line-height:1.6;
  display:none;
  white-space:pre-wrap;
}
.smallBtn{
  background:#334155;
  font-size:14px;
  padding:12px;
}
</style>
</head>
<body>
<div class="card">
<a class="back" href="index.html">← 回首頁</a>
<h1>📊 Maple Idle 升級分析器</h1>
<div class="sub">
上傳遊戲截圖後，自動分析 EXP 與掛機時間，直接顯示預估剩餘升級時間。
</div>
<input type="file" id="imageUpload" accept="image/*">
<img id="preview" class="preview">
<button onclick="analyzeImage()">開始分析圖片</button>
<div class="status" id="status">請先上傳遊戲截圖</div>
<div class="result">
  <div>預估剩餘升級時間</div>
  <div class="big" id="main">尚未分析</div>
  <div class="detail" id="detail"></div>
</div>
<button class="smallBtn" onclick="toggleDebug()">查看辨識結果</button>
<div class="debug" id="debug"></div>
</div>
<script>
let uploadedFile=null;
document.getElementById('imageUpload').addEventListener('change',e=>{
  uploadedFile=e.target.files[0];
  if(!uploadedFile)return;
  const img=document.getElementById('preview');
  img.src=URL.createObjectURL(uploadedFile);
  img.style.display='block';
  document.getElementById('status').innerText='圖片已上傳，請按「開始分析圖片」';
});
function toggleDebug(){
  const box=document.getElementById('debug');
  box.style.display=box.style.display==='block'?'none':'block';
}
async function analyzeImage(){
  if(!uploadedFile){
    alert('請先上傳圖片');
    return;
  }
  const status=document.getElementById('status');
  status.innerText='辨識中，第一次可能需要 10~30 秒...';
  try{
    const result=await Tesseract.recognize(
      uploadedFile,
      'eng+chi_tra',
      {
        logger:m=>{
          if(m.status==='recognizing text'){
            status.innerText='辨識中：'+Math.round(m.progress*100)+'%';
          }
        }
      }
    );
    const text=result.data.text;
    document.getElementById('debug').innerText=text;
    const data=parseMapleText(text);
    if(!data.ok){
      status.innerText='辨識失敗，請換清楚一點的截圖';
      document.getElementById('main').innerText='無法分析';
      document.getElementById('detail').innerHTML=data.reason;
      return;
    }
    const calc=calculate(data);
    status.innerText='分析完成';
    document.getElementById('main').innerText=calc.timeText;
    document.getElementById('detail').innerHTML=
      `目前 EXP：<b>${data.current}%</b><br>`+
      `掛機前 EXP：<b>${data.before}%</b><br>`+
      `掛機後 EXP：<b>${data.after}%</b><br>`+
      `掛機時間：<b>${data.playtimeText}</b><br>`+
      `效率：約 <b>${calc.perHour.toFixed(3)}% / 小時</b>`;
  }catch(err){
    console.error(err);
    status.innerText='分析失敗，請重新上傳較清楚的圖片';
    document.getElementById('main').innerText='分析失敗';
  }
}
function parseMapleText(text){
  const cleaned=text.replace(/\s+/g,' ');
  const percentMatches=cleaned.match(/\d{1,3}\.\d{1,3}\s*%/g) || [];
  const percents=percentMatches
    .map(x=>Number(x.replace('%','').trim()))
    .filter(x=>isFinite(x) && x>=0 && x<=100);
  if(percents.length<2){
    return {
      ok:false,
      reason:'找不到足夠的 EXP 百分比。請確認截圖中有掛機前後 EXP。'
    };
  }
  let before=percents[0];
  let after=percents[1];
  if(after<before && percents.length>=3){
    before=percents[1];
    after=percents[2];
  }
  const current=after;
  const timeMatch=cleaned.match(/(\d{1,2})[:：](\d{2})[:：](\d{2})/);
  if(!timeMatch){
    return {
      ok:false,
      reason:'找不到 PLAYTIME 時間。請確認截圖有 00:37:24 這種格式。'
    };
  }
  const h=Number(timeMatch[1]);
  const m=Number(timeMatch[2]);
  const s=Number(timeMatch[3]);
  const hours=h+m/60+s/3600;
  if(hours<=0){
    return {
      ok:false,
      reason:'掛機時間為 0，無法計算。'
    };
  }
  return {
    ok:true,
    current,
    before,
    after,
    hours,
    playtimeText:`${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`
  };
}
function calculate(data){
  const target=100;
  const dailyHours=24;
  const gain=data.after-data.before;
  const perHour=gain/data.hours;
  const remain=target-data.current;
  if(perHour<=0 || remain<=0){
    return {
      timeText:'已達標或資料錯誤',
      perHour:0
    };
  }
  const needHours=remain/perHour;
  const days=Math.floor(needHours/dailyHours);
  const hours=needHours-days*dailyHours;
  return {
    timeText:`約 ${days} 天 ${hours.toFixed(1)} 小時`,
    perHour
  };
}
</script>
</body>
</html>
