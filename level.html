<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>掛機效率分析器</title>

<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>

<style>
*{box-sizing:border-box}
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans TC",Arial,sans-serif;
  background:#f3f6fb;
  color:#0f172a;
}
.container{
  max-width:520px;
  margin:auto;
  padding:20px;
}
.homeBtn{
  display:inline-block;
  padding:11px 16px;
  border-radius:10px;
  background:#4f7cff;
  color:#fff;
  text-decoration:none;
  font-weight:800;
  margin-bottom:18px;
}
h2{
  text-align:center;
  margin:8px 0 20px;
}
.uploadBox{
  background:#fff;
  border:2px dashed #cbd5e1;
  border-radius:16px;
  padding:18px;
  text-align:center;
  box-shadow:0 8px 24px rgba(15,23,42,.06);
}
.uploadBox input{
  display:none;
}
.uploadLabel{
  display:block;
  font-weight:800;
  font-size:17px;
  margin-bottom:12px;
}
.preview{
  width:100%;
  max-height:280px;
  object-fit:contain;
  border-radius:12px;
  background:#e5e7eb;
}
.progressBox{
  margin-top:16px;
  background:#fff;
  border-radius:16px;
  padding:16px;
  box-shadow:0 8px 24px rgba(15,23,42,.06);
}
.progressBar{
  height:10px;
  background:#e5e7eb;
  border-radius:999px;
  overflow:hidden;
}
.progressInner{
  height:100%;
  width:0%;
  background:linear-gradient(90deg,#4f7cff,#22c55e);
  transition:.25s;
}
.status{
  margin-top:10px;
  text-align:right;
  color:#475569;
  font-size:14px;
}
.card{
  background:#fff;
  border-radius:16px;
  padding:16px;
  margin-top:16px;
  box-shadow:0 8px 24px rgba(15,23,42,.06);
}
.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
}
.item{
  background:#f8fafc;
  border-radius:12px;
  padding:14px 8px;
  text-align:center;
  min-height:58px;
}
.label{
  color:#64748b;
  font-size:13px;
}
.value{
  margin-top:6px;
  font-size:17px;
  font-weight:900;
}
.bigValue{
  text-align:center;
  font-size:24px;
  color:#4f7cff;
  font-weight:900;
  margin:10px 0 18px;
}
.warn{
  color:#f97316;
  font-size:13px;
  margin-top:10px;
  word-break:break-word;
}
button{
  width:100%;
  border:0;
  border-radius:12px;
  padding:15px;
  font-size:16px;
  font-weight:900;
  color:#fff;
  margin-top:10px;
}
.primary{background:#4f7cff}
.gray{background:#6b7280}
textarea{
  width:100%;
  height:180px;
  margin-top:12px;
  border-radius:12px;
  border:1px solid #cbd5e1;
  padding:12px;
  resize:none;
  display:none;
}
.help{
  font-size:13px;
  color:#64748b;
  line-height:1.6;
  margin-top:12px;
  text-align:left;
}
@media(max-width:430px){
  .container{padding:20px}
  .preview{max-height:250px}
  .grid{gap:10px}
  .value{font-size:15px}
}
</style>
</head>

<body>
<div class="container">

<a class="homeBtn" href="index.html">← 回首頁</a>

<h2>掛機效率分析器</h2>

<div class="uploadBox">
  <label class="uploadLabel" for="fileInput">📷 上傳 / 貼上截圖自動分析</label>
  <input id="fileInput" type="file" accept="image/*">
  <img id="preview" class="preview" alt="請上傳截圖">
  <div class="help">
    建議上傳「自動狩獵戰況」畫面。新版會優先辨識：<br>
    Lv.106 (88.858%) → Lv.106 (89.247%) 與 PLAYTIME。
  </div>
</div>

<div class="progressBox">
  <div class="progressBar">
    <div id="progressInner" class="progressInner"></div>
  </div>
  <div id="status" class="status">尚未開始分析</div>
</div>

<div class="card">
  <div class="grid">
    <div class="item">
      <div class="label">等級</div>
      <div id="level" class="value">-</div>
    </div>
    <div class="item">
      <div class="label">掛機時間</div>
      <div id="playtime" class="value">-</div>
    </div>
    <div class="item">
      <div class="label">起始 EXP</div>
      <div id="startExp" class="value">-</div>
    </div>
    <div class="item">
      <div class="label">目前 EXP</div>
      <div id="currentExp" class="value">-</div>
    </div>
    <div class="item">
      <div class="label">獲得 EXP</div>
      <div id="gainExp" class="value">-</div>
    </div>
    <div class="item">
      <div class="label">剩餘 EXP</div>
      <div id="remainExp" class="value">-</div>
    </div>
  </div>
</div>

<div class="card">
  <div id="mainResult" class="bigValue">-</div>
  <div class="grid">
    <div class="item">
      <div class="label">EXP 每分鐘</div>
      <div id="expPerMin" class="value">-</div>
    </div>
    <div class="item">
      <div class="label">EXP 每小時</div>
      <div id="expPerHour" class="value">-</div>
    </div>
    <div class="item">
      <div class="label">EXP 每天 24H</div>
      <div id="expPerDay" class="value">-</div>
    </div>
    <div class="item">
      <div class="label">上線時間</div>
      <div id="onlineTime" class="value">-</div>
    </div>
    <div class="item">
      <div class="label">怪物每分鐘</div>
      <div id="mobPerMin" class="value">-</div>
    </div>
    <div class="item">
      <div class="label">怪物每小時</div>
      <div id="mobPerHour" class="value">-</div>
    </div>
  </div>
  <div id="warn" class="warn"></div>
</div>

<div class="card">
  <button class="primary" onclick="copyResult()">一鍵複製結果</button>
  <button class="gray" onclick="toggleText()">查看辨識文字</button>
  <textarea id="ocrText" readonly></textarea>
</div>

</div>

<script>
const fileInput = document.getElementById("fileInput");
const preview = document.getElementById("preview");
const progressInner = document.getElementById("progressInner");
const statusEl = document.getElementById("status");
const ocrText = document.getElementById("ocrText");

let lastResult = "";

fileInput.addEventListener("change", async e=>{
  const file = e.target.files[0];
  if(!file) return;

  const url = URL.createObjectURL(file);
  preview.src = url;

  resetUI();
  await runOCR(file);
});

async function runOCR(file){
  try{
    statusEl.textContent = "OCR 載入中...";
    progressInner.style.width = "5%";

    const result = await Tesseract.recognize(file, "eng", {
      logger:m=>{
        if(m.status){
          let p = Math.round((m.progress || 0) * 100);
          if(m.status.includes("recognizing text")){
            progressInner.style.width = Math.max(15,p) + "%";
            statusEl.textContent = "辨識中 " + p + "%";
          }else{
            statusEl.textContent = m.status;
          }
        }
      }
    });

    progressInner.style.width = "100%";
    statusEl.textContent = "分析完成";

    const text = cleanText(result.data.text || "");
    ocrText.value = text;

    analyze(text);

  }catch(err){
    statusEl.textContent = "分析失敗";
    document.getElementById("warn").textContent = "OCR 發生錯誤：" + err.message;
  }
}

function cleanText(text){
  return text
    .replace(/[|｜]/g," ")
    .replace(/[％]/g,"%")
    .replace(/[，,]/g,".")
    .replace(/[（]/g,"(")
    .replace(/[）]/g,")")
    .replace(/\s+/g," ")
    .trim();
}

function analyze(text){
  let warn = [];
  let level = null;
  let startExp = null;
  let currentExp = null;

  const lvExpList = [];

  const lvRegex = /L[vV][\.\s]*([0-9]{1,3})\s*[>»]*\s*[L]?[vV]?\.?\s*([0-9]{1,3})?\s*[\(\[]?\s*([0-9]{1,2}(?:[\.\s][0-9]{1,3})?)\s*%?/g;

  let m;
  while((m = lvRegex.exec(text)) !== null){
    const lv1 = toNum(m[1]);
    const lv2 = m[2] ? toNum(m[2]) : null;
    const exp = fixPercent(m[3]);
    if(exp !== null && exp >= 0 && exp <= 100){
      lvExpList.push({
        level: lv2 || lv1,
        exp
      });
    }
  }

  if(lvExpList.length >= 2){
    level = lvExpList[lvExpList.length - 1].level;
    startExp = lvExpList[0].exp;
    currentExp = lvExpList[lvExpList.length - 1].exp;
  }

  if(startExp === null || currentExp === null){
    const percentList = extractPercentList(text);
    if(percentList.length >= 2){
      startExp = percentList[0];
      currentExp = percentList[percentList.length - 1];
    }
  }

  if(level === null){
    const lvOnly = text.match(/L[vV][\.\s]*([0-9]{1,3})/);
    if(lvOnly) level = toNum(lvOnly[1]);
  }

  const playSeconds = extractPlaytime(text);
  const monsterCount = extractMonsterCount(text);

  if(startExp !== null && currentExp !== null && currentExp < startExp){
    currentExp += 100;
  }

  const gain = startExp !== null && currentExp !== null ? currentExp - startExp : null;
  const remain = currentExp !== null ? 100 - (currentExp % 100) : null;

  let expPerMin = null;
  let expPerHour = null;
  let expPerDay = null;
  let levelUpTime = null;

  if(gain !== null && playSeconds && playSeconds > 0){
    const mins = playSeconds / 60;
    expPerMin = gain / mins;
    expPerHour = expPerMin * 60;
    expPerDay = expPerHour * 24;

    if(remain !== null && expPerMin > 0){
      levelUpTime = remain / expPerMin;
    }
  }

  let mobPerMin = null;
  let mobPerHour = null;

  if(monsterCount !== null && playSeconds && playSeconds > 0){
    mobPerMin = monsterCount / (playSeconds / 60);
    mobPerHour = mobPerMin * 60;
  }

  setText("level", level !== null ? "Lv." + level : "-");
  setText("playtime", playSeconds ? formatTime(playSeconds) : "-");
  setText("onlineTime", playSeconds ? formatTime(playSeconds) : "-");
  setText("startExp", startExp !== null ? fmt(startExp) + "%" : "-");
  setText("currentExp", currentExp !== null ? fmt(currentExp % 100) + "%" : "-");
  setText("gainExp", gain !== null ? fmt(gain) + "%" : "-");
  setText("remainExp", remain !== null ? fmt(remain) + "%" : "-");

  setText("expPerMin", expPerMin !== null ? fmt(expPerMin) + "% / 分" : "-");
  setText("expPerHour", expPerHour !== null ? fmt(expPerHour) + "% / 時" : "-");
  setText("expPerDay", expPerDay !== null ? fmt(expPerDay) + "% / 24H" : "-");

  setText("mobPerMin", mobPerMin !== null ? Math.round(mobPerMin) + " 隻 / 分" : "-");
  setText("mobPerHour", mobPerHour !== null ? Math.round(mobPerHour) + " 隻 / 時" : "-");

  if(levelUpTime !== null){
    setText("mainResult", "約 " + formatMinutes(levelUpTime) + " 升級");
  }else{
    setText("mainResult", "-");
  }

  if(startExp === null || currentExp === null){
    warn.push("找不到起始與目前 EXP，請確認截圖有顯示 Lv.xxx (xx.xxx%)。");
  }
  if(!playSeconds){
    warn.push("找不到 PLAYTIME / 上線時間，無法計算每分鐘與每小時效率。");
  }

  document.getElementById("warn").textContent = warn.join(" ");

  lastResult =
`掛機效率分析結果
等級：${level !== null ? "Lv." + level : "-"}
掛機時間：${playSeconds ? formatTime(playSeconds) : "-"}
起始 EXP：${startExp !== null ? fmt(startExp) + "%" : "-"}
目前 EXP：${currentExp !== null ? fmt(currentExp % 100) + "%" : "-"}
獲得 EXP：${gain !== null ? fmt(gain) + "%" : "-"}
剩餘 EXP：${remain !== null ? fmt(remain) + "%" : "-"}
EXP 每分鐘：${expPerMin !== null ? fmt(expPerMin) + "%" : "-"}
EXP 每小時：${expPerHour !== null ? fmt(expPerHour) + "%" : "-"}
EXP 每天 24H：${expPerDay !== null ? fmt(expPerDay) + "%" : "-"}
預估升級時間：${levelUpTime !== null ? formatMinutes(levelUpTime) : "-"}
怪物每分鐘：${mobPerMin !== null ? Math.round(mobPerMin) : "-"}
怪物每小時：${mobPerHour !== null ? Math.round(mobPerHour) : "-"}`;
}

function extractPercentList(text){
  const list = [];
  const regex = /([0-9]{1,2}(?:[\.\s][0-9]{2,3})?)\s*%/g;
  let m;
  while((m = regex.exec(text)) !== null){
    const p = fixPercent(m[1]);
    if(p !== null && p >= 0 && p <= 100){
      list.push(p);
    }
  }
  return list;
}

function extractPlaytime(text){
  let m = text.match(/(?:PLAYTIME|Playtime|playtime|上線時間|掛機時間)?\s*([0-9]{1,2})[:：]([0-9]{2})[:：]([0-9]{2})/);
  if(m){
    return toNum(m[1]) * 3600 + toNum(m[2]) * 60 + toNum(m[3]);
  }

  m = text.match(/([0-9]{1,2})\s*[hH時]\s*([0-9]{1,2})\s*[mM分]/);
  if(m){
    return toNum(m[1]) * 3600 + toNum(m[2]) * 60;
  }

  return null;
}

function extractMonsterCount(text){
  const patterns = [
    /目前狩獵的怪物數量\s*([0-9]{3,8})/,
    /怪物數量\s*([0-9]{3,8})/,
    /monster\s*count\s*([0-9]{3,8})/i
  ];

  for(const p of patterns){
    const m = text.match(p);
    if(m) return toNum(m[1]);
  }

  const nums = text.match(/[0-9]{4,7}/g);
  if(nums){
    const candidates = nums.map(n=>toNum(n)).filter(n=>n >= 1000 && n <= 9999999);
    if(candidates.length) return candidates[0];
  }

  return null;
}

function fixPercent(v){
  if(!v) return null;
  v = String(v).replace(/\s+/g,".").replace(/[^\d.]/g,"");

  const parts = v.split(".");
  if(parts.length > 2){
    v = parts[0] + "." + parts.slice(1).join("");
  }

  let n = parseFloat(v);
  if(isNaN(n)) return null;

  if(n > 1000) n = n / 1000;
  if(n > 100) n = n / 10;

  return n;
}

function toNum(v){
  return Number(String(v).replace(/[^\d.]/g,""));
}

function fmt(n){
  return Number(n).toFixed(3).replace(/\.?0+$/,"");
}

function formatTime(sec){
  sec = Math.round(sec);
  const h = Math.floor(sec / 3600);
  const m = Math.floor((sec % 3600) / 60);
  const s = sec % 60;
  return String(h).padStart(2,"0") + ":" + String(m).padStart(2,"0") + ":" + String(s).padStart(2,"0");
}

function formatMinutes(mins){
  mins = Math.round(mins);
  const h = Math.floor(mins / 60);
  const m = mins % 60;
  if(h <= 0) return m + " 分鐘";
  return h + " 小時 " + m + " 分鐘";
}

function setText(id,val){
  document.getElementById(id).textContent = val;
}

function resetUI(){
  progressInner.style.width = "0%";
  statusEl.textContent = "準備分析...";
  ocrText.value = "";
  document.getElementById("warn").textContent = "";
  lastResult = "";

  [
    "level","playtime","startExp","currentExp","gainExp","remainExp",
    "mainResult","expPerMin","expPerHour","expPerDay","onlineTime",
    "mobPerMin","mobPerHour"
  ].forEach(id=>setText(id,"-"));
}

function copyResult(){
  if(!lastResult){
    alert("目前沒有可複製的結果");
    return;
  }
  navigator.clipboard.writeText(lastResult).then(()=>{
    alert("已複製結果");
  });
}

function toggleText(){
  ocrText.style.display = ocrText.style.display === "block" ? "none" : "block";
}
</script>

</body>
</html>
